```html id="login001"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ATH DIGITAL HUB</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    width:350px;
    padding:30px;
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.link{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.link a{
    color:#38bdf8;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="box">

    <h2>Login</h2>

    <form id="loginForm">

        <input type="text" id="phone" placeholder="Phone Number (09xxxx)" required>

        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    <div class="link">
        Don't have account?
        <a href="register.html">Register</a>
    </div>

</div>

<script>
// Demo users (later replace with Supabase)
let users = JSON.parse(localStorage.getItem("users")) || [];

document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    const phone = document.getElementById("phone").value;
    const password = document.getElementById("password").value;

    const user = users.find(u =>
        u.phone === phone && u.password === password
    );

    if(user){
        // save session
        localStorage.setItem("user", JSON.stringify(user));

        alert("Login Success");

        window.location.href = "profile.html";
    }else{
        alert("Invalid phone or password");
    }
});
</script>

</body>
</html>
```
