```html id="prof001"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - ATH DIGITAL HUB</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    width:380px;
    padding:30px;
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

.info{
    text-align:left;
    margin:15px 0;
    padding:10px;
    background:rgba(255,255,255,0.08);
    border-radius:10px;
}

.info p{
    margin:8px 0;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.logout{
    background:#ef4444;
    color:white;
}

.logout:hover{
    background:#dc2626;
}

.login-btn{
    background:#2563eb;
    color:white;
}

.login-btn:hover{
    background:#1d4ed8;
}
</style>
</head>
<body>

<div class="box">

    <h2>User Profile</h2>

    <div id="profileBox"></div>

    <button class="logout" onclick="logout()">Logout</button>

</div>

<script>
// get session user
let user = JSON.parse(localStorage.getItem("user"));

const box = document.getElementById("profileBox");

if(!user){
    box.innerHTML = `
        <p>You are not logged in</p>
        <button class="login-btn" onclick="location.href='login.html'">
            Go to Login
        </button>
    `;
}else{
    box.innerHTML = `
        <div class="info">
            <p><b>User ID:</b> ${user.user_id}</p>
            <p><b>Name:</b> ${user.name}</p>
            <p><b>Phone:</b> ${user.phone}</p>
        </div>
    `;
}

function logout(){
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>

</body>
</html>
```
