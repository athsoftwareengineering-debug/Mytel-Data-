        let currentLang = 'my';

        // ============================================================
        //  DROPDOWN TOGGLE
        // ============================================================
        function toggleDropdown(event) {
            if (!event) return;
            event.stopPropagation();
            const menu = document.getElementById('langMenu');
            const arrow = document.getElementById('dropdownArrow');
            if (menu) menu.classList.toggle('show');
            if (arrow) arrow.classList.toggle('open');
        }

        document.addEventListener('click', function(event) {
            const menu = document.getElementById('langMenu');
            const arrow = document.getElementById('dropdownArrow');
            const dropdown = document.querySelector('.lang-dropdown');
            if (dropdown && !dropdown.contains(event.target)) {
                if (menu) menu.classList.remove('show');
                if (arrow) arrow.classList.remove('open');
            }
        });

        // ============================================================
        //  SWITCH LANGUAGE
        // ============================================================
        function switchLanguage(langCode) {
            currentLang = langCode;
            const t = lang[langCode];

            const menu = document.getElementById('langMenu');
            const arrow = document.getElementById('dropdownArrow');
            if (menu) menu.classList.remove('show');
            if (arrow) arrow.classList.remove('open');

            document.querySelectorAll('#langMenu button').forEach(b => {
                b.classList.remove('active-lang');
            });
            document.querySelectorAll('#langMenu button').forEach(b => {
                const nameEl = b.querySelector('.lang-name');
                if (nameEl && nameEl.textContent === t.label) {
                    b.classList.add('active-lang');
                }
            });

            const labelEl = document.getElementById('currentLangLabel');
            if (labelEl) labelEl.textContent = t.label;

            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            if (tabLogin) tabLogin.textContent = t.tabLogin;
            if (tabRegister) tabRegister.textContent = t.tabRegister;

            const labelLoginPhone = document.getElementById('labelLoginPhone');
            const labelLoginPass = document.getElementById('labelLoginPass');
            const labelRememberMe = document.getElementById('labelRememberMe');
            const btnLoginSpan = document.querySelector('#btnLogin span');
            if (labelLoginPhone) labelLoginPhone.innerHTML = `<i class="fas fa-phone"></i> ${t.labelLoginPhone}`;
            if (labelLoginPass) labelLoginPass.innerHTML = `<i class="fas fa-lock"></i> ${t.labelLoginPass}`;
            if (labelRememberMe) labelRememberMe.textContent = t.labelRememberMe;
            if (btnLoginSpan) btnLoginSpan.textContent = t.btnLogin;

            const labelRegPhone = document.getElementById('labelRegPhone');
            const labelRegName = document.getElementById('labelRegName');
            const labelRegPass = document.getElementById('labelRegPass');
            const hintPhone = document.getElementById('hintPhone');
            const hintPass = document.getElementById('hintPass');
            const btnRegisterSpan = document.querySelector('#btnRegister span');
            if (labelRegPhone) labelRegPhone.innerHTML = `<i class="fas fa-phone"></i> ${t.labelRegPhone}`;
            if (labelRegName) labelRegName.innerHTML = `<i class="fas fa-user"></i> ${t.labelRegName}`;
            if (labelRegPass) labelRegPass.innerHTML = `<i class="fas fa-lock"></i> ${t.labelRegPass}`;
            if (hintPhone) hintPhone.innerHTML = `<i class="fas fa-info-circle"></i> ${t.hintPhone}`;
            if (hintPass) hintPass.innerHTML = `<i class="fas fa-info-circle"></i> ${t.hintPass}`;
            if (btnRegisterSpan) btnRegisterSpan.textContent = t.btnRegister;

            const footerText = document.getElementById('footerText');

                footerText.innerHTML =
                    `<i class="fas fa-shield-alt"></i> <span>${t.footer}</span><span class="footer-brand">${t.copyright}</span>`;
            }

            const videoTitle = document.getElementById('videoTitle');
            const videoFooterSpan = document.querySelector('#videoFooter span');
            if (videoTitle) videoTitle.innerHTML = `<i class="fas fa-play-circle"></i> ${t.videoTitle}`;
            if (videoFooterSpan) videoFooterSpan.textContent = t.videoFooter;

            const loginPhone = document.getElementById('loginPhone');
            const loginPass = document.getElementById('loginPass');
            const regPhone = document.getElementById('regPhone');
            const regName = document.getElementById('regName');
            const regPass = document.getElementById('regPass');
            if (loginPhone) loginPhone.placeholder = '09xxxxxxxxx';
            if (loginPass) loginPass.placeholder = '••••••••';
            if (regPhone) regPhone.placeholder = '09xxxxxxxxx';
            if (regName) regName.placeholder = t.namePlaceholder;
            if (regPass) regPass.placeholder = t.passPlaceholder;

                msg.classList.remove('show', 'success', 'error');
                msg.textContent = '';
            });

        // ============================================================
        //  FORM FUNCTIONS
        // ============================================================
        function isValidMyanmarPhone(phone) {
            const cleaned = phone.replace(/\s/g, '');
            return /^09\d{9}$/.test(cleaned);
        }

        function showForm(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabButtons = document.querySelectorAll('.tab button');

            if (loginForm) loginForm.classList.remove('active');
            if (registerForm) registerForm.classList.remove('active');
            tabButtons.forEach(btn => btn.classList.remove('active'));

            if (type === 'login') {
                if (loginForm) loginForm.classList.add('active');
                if (tabButtons[0]) tabButtons[0].classList.add('active');
            } else {
                if (registerForm) registerForm.classList.add('active');
                if (tabButtons[1]) tabButtons[1].classList.add('active');
            }

            document.querySelectorAll('.message').forEach(msg => {
                msg.classList.remove('show', 'success', 'error');
                msg.textContent = '';
            });
        }

        function showMessage(elementId, text, type) {
            const el = document.getElementById(elementId);
            if (el) {
                el.textContent = text;
                el.className = 'message show ' + type;
            }
        }

        // ============================================================
        //  VIDEO FUNCTIONS
        // ============================================================
        function openVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('introVideo');
            if (modal) modal.classList.add('show');
            if (video) {
                video.currentTime = 0;
                video.play().catch(err => console.log('Auto-play blocked:', err));
            }
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('introVideo');
            if (video) video.pause();
            if (modal) modal.classList.remove('show');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const modal = document.getElementById('videoModal');
            if (modal) {
                modal.addEventListener('click', function(e) {
                    if (e.target === this) closeVideo();
                });
            }
        });

        // ============================================================
        //  🔐 LOGIN (Supabase)
        // ============================================================
        async function handleLogin(e) {
            e.preventDefault();
            const t = lang[currentLang];
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPass').value;

            if (!isValidMyanmarPhone(phone)) {
                showMessage('loginMsg', '❌ ' + t.phoneError, 'error');
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('id, name, password')
                    .eq('phone', phone)
                    .maybeSingle();

                if (error) {
                    console.error('Login error:', error);
                    showMessage('loginMsg', '❌ ' + t.loginError, 'error');
                    return;
                }

                if (!data) {
                    showMessage('loginMsg', '❌ ' + t.loginError, 'error');
                    return;
                }

                if (data.password === password) {
                    showMessage('loginMsg', '✅ ' + t.loginSuccess, 'success');
                    setTimeout(openVideo, 800);
                } else {
                    showMessage('loginMsg', '❌ ' + t.loginError, 'error');
                }
            } catch (err) {
                console.error('Login exception:', err);
                showMessage('loginMsg', '❌ Server error: ' + err.message, 'error');
            }
        }

        // ============================================================
        //  📝 REGISTER (Supabase)
        // ============================================================
        async function handleRegister(e) {
            e.preventDefault();
            const t = lang[currentLang];
            const phone = document.getElementById('regPhone').value.trim();
            const name = document.getElementById('regName').value.trim();
            const password = document.getElementById('regPass').value;

            if (!isValidMyanmarPhone(phone)) {
                showMessage('regMsg', '❌ ' + t.regPhoneError, 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('regMsg', '❌ ' + t.regPassError, 'error');
                return;
            }

            if (name.length < 2) {
                showMessage('regMsg', '❌ ' + t.regNameError, 'error');
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .insert([{ 
                        phone: phone, 
                        name: name, 
                        password: password 
                    }])
                    .select();

                if (error) {
                    console.error('Registration error:', error);
                    if (error.code === '23505') {
                        showMessage('regMsg', '❌ ' + t.duplicatePhone, 'error');
                    } else {
                        showMessage('regMsg', '❌ ' + error.message, 'error');
                    }
                    return;
                }

                showMessage('regMsg', '✅ ' + t.regSuccess, 'success');
                
                document.getElementById('regPhone').value = '';
                document.getElementById('regName').value = '';
                document.getElementById('regPass').value = '';
                
                setTimeout(() => {
                    showForm('login');
                }, 2000);
                
            } catch (err) {
                console.error('Registration exception:', err);
                showMessage('regMsg', '❌ Server error: ' + err.message, 'error');
            }
        }
