<html lang="my">
<head>
    <meta charset="UTF-8">

<body>
    <!-- (HTML အားလုံး အတူတူပါပဲ) -->
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        // ============================================================
        //  🔐 SUPABASE CONFIG - FIXED VERSION
        // ============================================================
        const SUPABASE_URL = 'https://parjmzzxfuwbxzejnmhd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3bnh1enVva3lvbHRkanphc255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NTY1MjEsImV4cCI6MjA5NzUzMjUyMX0.bporyz_B_tDM1SU_QX6xGebXV-voal-zTrNfaLebyf4';

        // ✅ Create client with proper headers
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: true
            }
        });

        console.log('✅ Supabase client created');

        // ============================================================
        //  TEST CONNECTION FUNCTION
        // ============================================================
        async function testSupabaseConnection() {
            try {
                // Try to get users count (just to test connection)
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('id', { count: 'exact', head: true });

                if (error) {
                    console.error('❌ Connection test failed:', error);
                    console.log('🔍 Error details:', {
                        code: error.code,
                        message: error.message,
                        hint: error.hint
                    });
                    
                    // If table doesn't exist, try to create it
                    if (error.message.includes('does not exist')) {
                        console.log('ℹ️ users table does not exist. Trying to create...');
                        await createUsersTable();
                    }
                } else {
                    console.log('✅ Connection test successful!');
                }
            } catch (err) {
                console.error('❌ Connection error:', err);
            }
        }

        // ============================================================
        //  CREATE USERS TABLE (if not exists)
        // ============================================================
        async function createUsersTable() {
            try {
                // Note: You need to run this SQL in Supabase SQL Editor
                console.log('ℹ️ Please create users table using SQL Editor:');
                console.log(`
                    CREATE TABLE IF NOT EXISTS users (
                        id UUID PRIMARY KEY,
                        phone TEXT UNIQUE NOT NULL,
                        name TEXT NOT NULL,
                        password TEXT NOT NULL,
                        created_at TIMESTAMP DEFAULT NOW()
                    );
                    
                    -- Enable RLS
                    ALTER TABLE users ENABLE ROW LEVEL SECURITY;
                    
                    -- Create policy for all operations
                    CREATE POLICY "Allow all" ON users
                    FOR ALL
                    USING (true)
                    WITH CHECK (true);
                `);
            } catch (err) {
                console.error('❌ Failed to create table:', err);
            }
        }

        // ============================================================
        //  🔐 LOGIN - FIXED with better error handling
        // ============================================================
        async function handleLogin(e) {
            e.preventDefault();
            var t = lang[currentLang];
            var phone = document.getElementById('loginPhone').value.trim();
            var password = document.getElementById('loginPass').value;

            if (!isValidMyanmarPhone(phone)) {
                showMessage('loginMsg', '❌ ' + t.phoneError, 'error');
                return;
            }

            try {
                showMessage('loginMsg', '⏳ ဝင်ရောက်နေပါပြီ...', '');
                
                var result = await supabaseClient.auth.signInWithPassword({
                    phone: phone,
                    password: password
                });

                if (result.error) {
                    console.error('Login error:', result.error);
                    
                    // Better error messages
                    let errorMsg = t.loginError;
                    if (result.error.message.includes('Invalid login credentials')) {
                        errorMsg = '❌ ဖုန်းနံပါတ် သို့မဟုတ် စကားဝှက် မှားနေပါတယ်';
                    } else if (result.error.message.includes('Email not confirmed')) {
                        errorMsg = '❌ အကောင့်ကို အတည်မပြုရသေးပါ';
                    } else if (result.error.message.includes('rate limit')) {
                        errorMsg = '❌ အကြိမ်ကန့်သတ်ချက်ကျော်လွန်နေပါပြီ။ ခဏစောင့်ပါ';
                    }
                    
                    showMessage('loginMsg', errorMsg, 'error');
                    return;
                }

                if (result.data.user) {
                    showMessage('loginMsg', '✅ ' + t.loginSuccess, 'success');
                    setTimeout(openVideo, 800);
                } else {
                    showMessage('loginMsg', '❌ ' + t.loginError, 'error');
                }
            } catch (err) {
                console.error('Login exception:', err);
                showMessage('loginMsg', '❌ Server error: ' + err.message, 'error');
            }
        }

        // ============================================================
        //  📝 REGISTER - FIXED with better error handling
        // ============================================================
        async function handleRegister(e) {
            e.preventDefault();
            var t = lang[currentLang];
            var phone = document.getElementById('regPhone').value.trim();
            var name = document.getElementById('regName').value.trim();
            var password = document.getElementById('regPass').value;

            // Validation
            if (!isValidMyanmarPhone(phone)) {
                showMessage('regMsg', '❌ ' + t.regPhoneError, 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('regMsg', '❌ ' + t.regPassError, 'error');
                return;
            }

            if (name.length < 2) {
                showMessage('regMsg', '❌ ' + t.regNameError, 'error');
                return;
            }

            try {
                showMessage('regMsg', '⏳ မှတ်ပုံတင်နေပါပြီ...', '');

                // ✅ Try to register with Supabase Auth
                var result = await supabaseClient.auth.signUp({
                    phone: phone,
                    password: password,
                    options: {
                        data: {
                            name: name,
                            phone: phone
                        }
                    }
                });

                if (result.error) {
                    console.error('Registration error:', result.error);
                    
                    // Better error messages
                    let errorMsg = result.error.message;
                    if (result.error.message.includes('already registered')) {
                        errorMsg = '❌ ' + t.duplicatePhone;
                    } else if (result.error.message.includes('Invalid API key')) {
                        errorMsg = '❌ API Key မှားနေပါတယ်။ Supabase Dashboard က Anon Key အသစ်ယူပါ။';
                    } else if (result.error.message.includes('rate limit')) {
                        errorMsg = '❌ အကြိမ်ကန့်သတ်ချက်ကျော်လွန်နေပါပြီ။ ခဏစောင့်ပါ';
                    }
                    
                    showMessage('regMsg', errorMsg, 'error');
                    return;
                }

                if (result.data.user) {
                    // ✅ Save to users table (optional)
                    try {
                        const { error: insertError } = await supabaseClient
                            .from('users')
                            .insert([{
                                id: result.data.user.id,
                                phone: phone,
                                name: name,
                                password: password,
                                created_at: new Date().toISOString()
                            }]);

                        if (insertError) {
                            console.warn('Could not save to users table:', insertError);
                        } else {
                            console.log('✅ User saved to users table');
                        }
                    } catch (dbError) {
                        console.warn('Database operation skipped:', dbError);
                    }

                    showMessage('regMsg', '✅ ' + t.regSuccess, 'success');

                    // Clear form
                    document.getElementById('regPhone').value = '';
                    document.getElementById('regName').value = '';
                    document.getElementById('regPass').value = '';

                    // Switch to login after 2 seconds
                    setTimeout(function() {
                        showForm('login');
                    }, 2000);
                }

            } catch (err) {
                console.error('Registration exception:', err);
                showMessage('regMsg', '❌ Server error: ' + err.message, 'error');
            }
        }

        // ============================================================
        //  DOM READY - Run test
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            var modal = document.getElementById('videoModal');
            if (modal) {
                modal.addEventListener('click', function(e) {
                    if (e.target === this) closeVideo();
                });
            }
            switchLanguage('my');
            
            // Test connection after page loads
            setTimeout(testSupabaseConnection, 1000);
        });

        // ============================================================
        //  (ကျန်တဲ့ functions အားလုံး အတူတူပါပဲ)
        // ============================================================
        // ... togglePassword, switchLanguage, showForm, etc.
    </script>
</body>
</html>
