<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATH DIGITAL HUB - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 35px;
            width: 420px;
            max-width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* ===== GLOBAL LANGUAGE DROPDOWN (Top Right) ===== */
        .lang-dropdown {
            position: absolute;
            top: 18px;
            right: 20px;
        }

        .lang-dropdown .dropdown-btn {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(10px);
        }

        .lang-dropdown .dropdown-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .lang-dropdown .dropdown-btn i {
            font-size: 16px;
        }

        .lang-dropdown .dropdown-btn .arrow {
            font-size: 12px;
            transition: transform 0.3s ease;
            margin-left: 2px;
        }

        .lang-dropdown .dropdown-btn .arrow.open {
            transform: rotate(180deg);
        }

        .lang-dropdown .dropdown-menu {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background: rgba(30, 30, 60, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 8px 0;
            min-width: 150px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            z-index: 100;
            animation: dropDown 0.25s ease;
        }

        .lang-dropdown .dropdown-menu.show {
            display: block;
        }

        @keyframes dropDown {
            from {
                opacity: 0;
                transform: translateY(-10px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .lang-dropdown .dropdown-menu button {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            text-align: left;
        }

        .lang-dropdown .dropdown-menu button:hover {
            background: rgba(255, 255, 255, 0.06);
            color: white;
        }

        .lang-dropdown .dropdown-menu button .flag {
            font-size: 18px;
        }

        .lang-dropdown .dropdown-menu button .lang-name {
            font-weight: 500;
        }

        .lang-dropdown .dropdown-menu button .check {
            margin-left: auto;
            color: #667eea;
            font-size: 14px;
            display: none;
        }

        .lang-dropdown .dropdown-menu button.active-lang .check {
            display: inline;
        }

        .lang-dropdown .dropdown-menu button.active-lang {
            color: white;
            background: rgba(102, 126, 234, 0.15);
        }

        /* ===== BRAND HEADER ===== */
        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand .logo h1 {
            color: white;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #a8b5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand .tagline {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ===== TAB ===== */
        .tab {
            display: flex;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 5px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab button {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.4s ease;
            font-family: 'Inter', sans-serif;
        }

        .tab button i {
            margin-right: 8px;
        }

        .tab button.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .tab button:hover:not(.active) {
            color: white;
        }

        .form {
            display: none;
            animation: fadeUp 0.5s ease;
        }

        .form.active {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            transition: 0.3s;
        }

        .input-group label i {
            margin-right: 6px;
            color: #667eea;
        }

        .input-group .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 14px;
            padding: 0 16px;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            position: relative;
        }

        .input-group .input-wrapper:focus-within {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .input-group .input-wrapper i {
            color: rgba(255, 255, 255, 0.3);
            font-size: 16px;
            margin-right: 12px;
            transition: 0.3s;
        }

        .input-group .input-wrapper:focus-within i {
            color: #667eea;
        }

        .input-group input {
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            transition: 0.3s;
        }

        /* ===== SHOW/HIDE PASSWORD BUTTON ===== */
        .toggle-password {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 16px;
            padding: 8px 4px;
            transition: all 0.3s ease;
            margin-left: 8px;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        .input-group .hint {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 6px;
            padding-left: 4px;
            transition: 0.3s;
        }

        /* ===== REMEMBER ME CHECKBOX ===== */
        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
            margin-bottom: 16px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
            cursor: pointer;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .remember-me input[type="checkbox"]:checked {
            background: #667eea;
            border-color: #667eea;
        }

        .remember-me label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
            user-select: none;
        }

        .remember-me label:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.35);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .message {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.2);
        }

        .message.error {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.2);
        }

        .footer {
            text-align: center;
            margin-top: 22px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            transition: 0.3s;
            letter-spacing: 0.5px;
            line-height: 1.8;
        }

        .footer .footer-brand {
            color: rgba(255, 255, 255, 0.25);
            font-weight: 600;
            display: block;
            margin-top: 2px;
        }

        /* ===== VIDEO MODAL ===== */
        .video-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        .video-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .video-box {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 20px;
            max-width: 700px;
            width: 95%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: zoomIn 0.5s ease;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .video-box .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 16px;
        }

        .video-box .video-header h3 {
            color: white;
            font-size: 18px;
            font-weight: 600;
            transition: 0.3s;
        }

        .video-box .video-header h3 i {
            color: #667eea;
            margin-right: 10px;
        }

        .video-box .video-header .close-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: rgba(255, 255, 255, 0.6);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .video-box .video-header .close-btn:hover {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
            transform: rotate(90deg);
        }

        .video-box video {
            width: 100%;
            border-radius: 14px;
            display: block;
            background: #000;
        }

        .video-box .video-footer {
            margin-top: 14px;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
            transition: 0.3s;
        }

        .video-box .video-footer i {
            color: #2ed573;
            margin-right: 6px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 28px 20px;
            }
            .brand .logo h1 {
                font-size: 20px;
            }
            .video-box {
                padding: 14px;
            }
            .lang-dropdown {
                top: 12px;
                right: 14px;
            }
            .lang-dropdown .dropdown-btn {
                padding: 6px 12px;
                font-size: 13px;
            }
            .lang-dropdown .dropdown-btn span.lang-label {
                display: none;
            }
            .remember-me label {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ===== GLOBAL LANGUAGE DROPDOWN (Top Right) ===== -->
        <div class="lang-dropdown">
            <button class="dropdown-btn" onclick="toggleDropdown(event)">
                <i class="fas fa-globe"></i>
                <span class="lang-label" id="currentLangLabel">မြန်မာ</span>
                <span class="arrow" id="dropdownArrow">▼</span>
            </button>
            <div class="dropdown-menu" id="langMenu">
                <button onclick="switchLanguage('my', this)" class="active-lang">
                    <span class="flag">🇲🇲</span>
                    <span class="lang-name">မြန်မာ</span>
                    <span class="check"><i class="fas fa-check"></i></span>
                </button>
                <button onclick="switchLanguage('en', this)">
                    <span class="flag">🇬🇧</span>
                    <span class="lang-name">English</span>
                    <span class="check"><i class="fas fa-check"></i></span>
                </button>
                <button onclick="switchLanguage('zh', this)">
                    <span class="flag">🇨🇳</span>
                    <span class="lang-name">中文</span>
                    <span class="check"><i class="fas fa-check"></i></span>
                </button>
            </div>
        </div>

        <!-- ===== BRAND HEADER ===== -->
        <div class="brand">
            <div class="logo">
                <h1>ATH DIGITAL HUB</h1>
            </div>
            <div class="tagline">သင့်ယုံကြည်ရာ ဒစ်ဂျစ်တယ်မိတ်ဖက်</div>
        </div>

        <!-- ===== TAB ===== -->
        <div class="tab">
            <button class="active" onclick="showForm('login')">
                <i class="fas fa-sign-in-alt"></i> <span id="tabLogin">ဝင်မည်</span>
            </button>
            <button onclick="showForm('register')">
                <i class="fas fa-user-plus"></i> <span id="tabRegister">မှတ်ပုံတင်မည်</span>
            </button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form active">
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label id="labelLoginPhone"><i class="fas fa-phone"></i> ဖုန်းနံပါတ်</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone-alt"></i>
                        <input type="tel" id="loginPhone" placeholder="09xxxxxxxxx" required>
                    </div>
                </div>

                <div class="input-group">
                    <label id="labelLoginPass"><i class="fas fa-lock"></i> လျှို့ဝှက်နံပါတ်</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" id="loginPass" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPass', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- ===== REMEMBER ME CHECKBOX ===== -->
                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe" id="labelRememberMe">မှတ်ထားမည်</label>
                </div>

                <button type="submit" class="btn-submit" id="btnLogin">
                    <i class="fas fa-arrow-right"></i> <span>ဝင်မည်</span>
                </button>
            </form>
            <div id="loginMsg" class="message"></div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="form">
            <form onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label id="labelRegPhone"><i class="fas fa-phone"></i> ဖုန်းနံပါတ်</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone-alt"></i>
                        <input type="tel" id="regPhone" placeholder="09xxxxxxxxx" required>
                    </div>
                    <div class="hint" id="hintPhone"><i class="fas fa-info-circle"></i> 09 နဲ့စပြီး စုစုပေါင်း ၁၁ လုံး</div>
                </div>

                <div class="input-group">
                    <label id="labelRegName"><i class="fas fa-user"></i> နာမည်</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-circle"></i>
                        <input type="text" id="regName" placeholder="သင့်နာမည်" required>
                    </div>
                </div>

                <div class="input-group">
                    <label id="labelRegPass"><i class="fas fa-lock"></i> လျှို့ဝှက်နံပါတ်</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" id="regPass" placeholder="အနည်းဆုံး ၆ လုံး" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('regPass', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="hint" id="hintPass"><i class="fas fa-info-circle"></i> အနည်းဆုံး ၆ လုံးထည့်ပါ</div>
                </div>

                <button type="submit" class="btn-submit" id="btnRegister">
                    <i class="fas fa-user-plus"></i> <span>မှတ်ပုံတင်မည်</span>
                </button>
            </form>
            <div id="regMsg" class="message"></div>
        </div>

        <!-- ===== FOOTER ===== -->
        <div class="footer" id="footerText">
            <i class="fas fa-shield-alt"></i> <span>သင့်ဒေတာကို လုံခြုံစွာ သိမ်းဆည်းထားပါသည်</span>
            <span class="footer-brand">Copyright © 2026 AUNG THU HTWE. All Rights Reserved.</span>
        </div>
    </div>

    <!-- ===== VIDEO MODAL ===== -->
    <div id="videoModal" class="video-overlay">
        <div class="video-box">
            <div class="video-header">
                <h3 id="videoTitle"><i class="fas fa-play-circle"></i> ကြိုဆိုပါတယ်!</h3>
                <button class="close-btn" onclick="closeVideo()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <video id="introVideo" controls autoplay>
                <source src="https://files.catbox.moe/1qrqhv.mp4" type="video/mp4">
                သင့် Browser က Video မထောက်ပံ့ပါ
            </video>

            <div class="video-footer" id="videoFooter">
                <i class="fas fa-check-circle"></i> <span>အကောင့်ဝင်ခြင်း အောင်မြင်ပါပြီ။ ခံစားလိုက်ပါ။</span>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  SUPABASE CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://parjmzzxfuwbxzejnmhd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_SQLVLvSCAWTNzw-oB4PXKQ_JtZ92xiQ';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        //  TOGGLE PASSWORD
        // ============================================================
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // ============================================================
        //  LANGUAGE DATA
        // ============================================================
        const lang = {
            my: {
                label: "မြန်မာ",
                tabLogin: "ဝင်မည်",
                tabRegister: "မှတ်ပုံတင်မည်",
                labelLoginPhone: "ဖုန်းနံပါတ်",
                labelLoginPass: "လျှို့ဝှက်နံပါတ်",
                labelRememberMe: "မှတ်ထားမည်",
                btnLogin: "ဝင်မည်",
                labelRegPhone: "ဖုန်းနံပါတ်",
                labelRegName: "နာမည်",
                labelRegPass: "လျှို့ဝှက်နံပါတ်",
                hintPhone: "09 နဲ့စပြီး စုစုပေါင်း ၁၁ လုံး",
                hintPass: "အနည်းဆုံး ၆ လုံးထည့်ပါ",
                btnRegister: "မှတ်ပုံတင်မည်",
                footer: "သင့်ဒေတာကို လုံခြုံစွာ သိမ်းဆည်းထားပါသည်",

        let currentLang = 'my';

        // ============================================================
        //  DROPDOWN TOGGLE
        // ============================================================
        function toggleDropdown(event) {
            event.stopPropagation();
            const menu = document.getElementById('langMenu');
            const arrow = document.getElementById('dropdownArrow');
            menu.classList.toggle('show');
            arrow.classList.toggle('open');
        }

        document.addEventListener('click', function() {
            const menu = document.getElementById('langMenu');
            const arrow = document.getElementById('dropdownArrow');
            menu.classList.remove('show');
            arrow.classList.remove('open');
        });

        // ============================================================
        //  SWITCH LANGUAGE (ပြင်ဆင်ပြီး)
        // ============================================================
        function switchLanguage(langCode, btn) {
            currentLang = langCode;
            const t = lang[langCode];

            document.getElementById('langMenu').classList.remove('show');
            document.getElementById('dropdownArrow').classList.remove('open');

            document.querySelectorAll('#langMenu button').forEach(b => b.classList.remove('active-lang'));
            if (btn) btn.classList.add('active-lang');

            document.getElementById('currentLangLabel').textContent = t.label;

            document.getElementById('tabLogin').textContent = t.tabLogin;
            document.getElementById('tabRegister').textContent = t.tabRegister;

            document.getElementById('labelLoginPhone').innerHTML =
            `<i class="fas fa-phone"></i> ${t.labelLoginPhone}`;
            document.getElementById('labelLoginPass').innerHTML =
            `<i class="fas fa-lock"></i> ${t.labelLoginPass}`;
            document.getElementById('labelRememberMe').textContent = t.labelRememberMe;
            document.querySelector('#btnLogin span').textContent = t.btnLogin;

            document.getElementById('labelRegPhone').innerHTML =
            `<i class="fas fa-phone"></i> ${t.labelRegPhone}`;
            document.getElementById('labelRegName').innerHTML =
            `<i class="fas fa-user"></i> ${t.labelRegName}`;
            document.getElementById('labelRegPass').innerHTML =
            `<i class="fas fa-lock"></i> ${t.labelRegPass}`;
            document.getElementById('hintPhone').innerHTML =
            `<i class="fas fa-info-circle"></i> ${t.hintPhone}`;
            document.getElementById('hintPass').innerHTML =
            `<i class="fas fa-info-circle"></i> ${t.hintPass}`;
            document.querySelector('#btnRegister span').textContent = t.btnRegister;

            document.getElementById('footerText').innerHTML =
                `<i class="fas fa-shield-alt"></i> <span>${t.footer}</span><span class="footer-brand">${t.copyright}</span>`;
            document.getElementById('videoTitle').innerHTML =
            `<i class="fas fa-play-circle"></i> ${t.videoTitle}`;
            document.querySelector('#videoFooter span').textContent = t.videoFooter;

            document.getElementById('loginPhone').placeholder = '09xxxxxxxxx';
            document.getElementById('loginPass').placeholder = '••••••••';
            document.getElementById('regPhone').placeholder = '09xxxxxxxxx';
            document.getElementById('regName').placeholder = t.namePlaceholder;
            document.getElementById('regPass').placeholder = t.passPlaceholder;

            document.querySelectorAll('.message').forEach(msg => {
                msg.classList.remove('show', 'success', 'error');
                msg.textContent = '';
            });
        }

        // ============================================================
        //  FORM FUNCTIONS
        // ============================================================
        function isValidMyanmarPhone(phone) {
            const cleaned = phone.replace(/\s/g, '');
            return /^09\d{9}$/.test(cleaned);
        }

        function showForm(type) {
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('registerForm').classList.remove('active');
            document.querySelectorAll('.tab button').forEach(btn => btn.classList.remove('active'));

            if (type === 'login') {
                document.getElementById('loginForm').classList.add('active');
                document.querySelector('.tab button:first-child').classList.add('active');
            } else {
                document.getElementById('registerForm').classList.add('active');
                document.querySelector('.tab button:last-child').classList.add('active');
            }

            document.querySelectorAll('.message').forEach(msg => {
                msg.classList.remove('show', 'success', 'error');
                msg.textContent = '';
            });
        }

        function showMessage(elementId, text, type) {
            const el = document.getElementById(elementId);
            el.textContent = text;
            el.className = 'message show ' + type;
        }

        // ============================================================
        //  VIDEO FUNCTIONS
        // ============================================================
        function openVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('introVideo');
            modal.classList.add('show');
            video.currentTime = 0;
            video.play().catch(err => console.log('Auto-play blocked:', err));
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('introVideo');
            video.pause();
            modal.classList.remove('show');
        }

        document.getElementById('videoModal').addEventListener('click', function(e) {
            if (e.target === this) closeVideo();
        });

        // ============================================================
        //  🔐 LOGIN (Supabase)
        // ============================================================
        async function handleLogin(e) {
            e.preventDefault();
            const t = lang[currentLang];
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPass').value;

            if (!isValidMyanmarPhone(phone)) {
                showMessage('loginMsg', '❌ ' + t.phoneError, 'error');
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('id, name, password')
                    .eq('phone', phone)
                    .single();

                if (error || !data) {
                    showMessage('loginMsg', '❌ ' + t.loginError, 'error');
                    return;
                }

                if (data.password === password) {
                    showMessage('loginMsg', '✅ ' + t.loginSuccess, 'success');
                    setTimeout(openVideo, 800);
                } else {
                    showMessage('loginMsg', '❌ ' + t.loginError, 'error');
                }
            } catch (err) {
                showMessage('loginMsg', '❌ Server error', 'error');
            }
        }

        // ============================================================
        //  📝 REGISTER (Supabase)
        // ============================================================
        async function handleRegister(e) {
            e.preventDefault();
            const t = lang[currentLang];
            const phone = document.getElementById('regPhone').value.trim();
            const name = document.getElementById('regName').value.trim();
            const password = document.getElementById('regPass').value;

            if (!isValidMyanmarPhone(phone)) {
                showMessage('regMsg', '❌ ' + t.regPhoneError, 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('regMsg', '❌ ' + t.regPassError, 'error');
                return;
            }

            if (name.length < 2) {
                showMessage('regMsg', '❌ ' + t.regNameError, 'error');
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('users')
                    .insert([{ phone: phone, name: name, password: password }]);

                if (error) {
                    if (error.code === '23505') {
                        showMessage('regMsg', '❌ ဖုန်းနံပါတ် ရှိပြီးသားပါ', 'error');
                    } else {
                        showMessage('regMsg', '❌ ' + error.message, 'error');
                    }
                    return;
                }

                showMessage('regMsg', '✅ ' + t.regSuccess, 'success');
            } catch (err) {
                showMessage('regMsg', '❌ Server error', 'error');
            }
        }
    </script>
