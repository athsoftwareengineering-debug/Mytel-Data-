<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operators - ATH DIGITAL HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans Myanmar', sans-serif;
            padding: 0;
            margin: 0;
        }
        
        /* ===== ADMIN TOGGLE ===== */
        .admin-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 35px rgba(245, 158, 11, 0.5);
        }
        .admin-toggle.active {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4);
        }
        
        /* ===== ADMIN PANEL ===== */
        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9998;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            overflow-y: auto;
        }
        .admin-panel.open {
            display: block;
        }
        .admin-panel-content {
            max-width: 800px;
            margin: 20px auto;
            background: linear-gradient(145deg, #1a1d2e, #0f111a);
            border-radius: 1.5rem;
            padding: 2rem;
            border: 1px solid rgba(0, 212, 255, 0.15);
        }
        .admin-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .admin-panel-header h2 {
            color: #e2e8f0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-panel-header h2 i {
            color: #f59e0b;
        }
        .admin-close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }
        .admin-close-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #ef4444;
        }
        
        .admin-operator-group {
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 20px;
        }
        .admin-operator-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .admin-operator-title {
            color: #00d4ff;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-operator-title img {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            object-fit: cover;
        }
        .admin-plan-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .admin-plan-row .plan-label {
            flex: 1;
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .admin-plan-row .price-input {
            width: 120px;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #e2e8f0;
            font-size: 0.85rem;
            text-align: right;
        }
        .admin-plan-row .price-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }
        .admin-plan-row .price-input::placeholder {
            color: #4a5568;
        }
        .admin-plan-row .currency-label {
            color: #10b981;
            font-size: 0.7rem;
            font-weight: 600;
            min-width: 35px;
        }
        
        .admin-save-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .admin-save-btn:hover {
            transform: scale(0.98);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.3);
        }
        .admin-save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .admin-status-msg {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-top: 12px;
            display: none;
        }
        .admin-status-msg.success {
            display: block;
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .admin-status-msg.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        /* ===== TABS ===== */
        .tabs-container {
            background: linear-gradient(145deg, #0f111a, #0a0c15);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        .tab-headers {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 10px;
        }
        .tab-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border: none;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.04);
            color: #94a3b8;
            flex: 1;
            justify-content: center;
            min-width: 60px;
        }
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(8, 145, 178, 0.2));
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.05);
        }
        .tab-btn img {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.05);
        }
        .tab-btn .tab-label {
            display: inline-block;
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .operator-plans {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            padding: 4px 0;
        }
        .plan-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }
        .plan-card:hover {
            background: rgba(0, 212, 255, 0.05);
            border-color: rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }
        .plan-card .plan-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 6px;
        }
        .plan-card .plan-details {
            font-size: 0.7rem;
            color: #94a3b8;
            line-height: 1.8;
        }
        .plan-card .plan-details i {
            color: #00d4ff;
            width: 18px;
        }
        .plan-card .plan-price {
            font-size: 1.1rem;
            font-weight: 700;
            color: #10b981;
            margin-top: 10px;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .plan-card .plan-price small {
            font-size: 0.6rem;
            color: #94a3b8;
            font-weight: normal;
        }
        .plan-buy-btn {
            width: 100%;
            margin-top: 10px;
            background: linear-gradient(135deg, #00d4ff, #0891b2);
            border: none;
            padding: 8px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .plan-buy-btn:hover:not(:disabled) {
            transform: scale(0.97);
            background: linear-gradient(135deg, #00e5ff, #0a7e9e);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2);
        }
        .plan-buy-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .operator-badge {
            display: inline-block;
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 40px;
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
            margin-bottom: 12px;
        }
        
        .loading-text {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .loading-text i {
            margin-right: 8px;
        }
        
        @media (max-width: 480px) {
            .tab-btn {
                padding: 8px 12px;
                font-size: 0.7rem;
                flex: 1 1 auto;
                min-width: 50px;
            }
            .tab-btn img {
                width: 22px;
                height: 22px;
            }
            .tab-btn .tab-label {
                font-size: 0.65rem;
            }
            .operator-plans {
                grid-template-columns: 1fr 1fr;
            }
            .plan-card .plan-name {
                font-size: 0.75rem;
            }
            .plan-card .plan-price {
                font-size: 0.95rem;
            }
            .admin-panel-content {
                padding: 1rem;
                margin: 10px;
            }
            .admin-plan-row {
                flex-wrap: wrap;
                gap: 6px;
            }
            .admin-plan-row .price-input {
                width: 100px;
                font-size: 0.75rem;
            }
            .admin-toggle {
                width: 45px;
                height: 45px;
                font-size: 1rem;
                bottom: 15px;
                right: 15px;
            }
        }
        @media (max-width: 380px) {
            .operator-plans {
                grid-template-columns: 1fr;
            }
            .tab-headers {
                gap: 4px;
            }
            .tab-btn {
                padding: 6px 10px;
                font-size: 0.6rem;
                min-width: 40px;
            }
            .tab-btn img {
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== USER VIEW ===== -->
    <div id="app">
        <div class="loading-text"><i class="fas fa-spinner fa-pulse"></i> Loading operators...</div>
    </div>

    <!-- ===== ADMIN TOGGLE BUTTON ===== -->
    <button class="admin-toggle" id="adminToggle" onclick="toggleAdminPanel()" title="Admin Panel">
        <i class="fas fa-cog"></i>
    </button>

    <!-- ===== ADMIN PANEL ===== -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-panel-content">
            <div class="admin-panel-header">
                <h2><i class="fas fa-cog"></i> ဈေးနှုန်းများ ပြင်ဆင်ရန်</h2>
                <button class="admin-close-btn" onclick="toggleAdminPanel()">
                    <i class="fas fa-times"></i> ပိတ်မည်
                </button>
            </div>
            
            <div id="adminForm"></div>
            
            <button class="admin-save-btn" id="adminSaveBtn" onclick="savePrices()">
                <i class="fas fa-save"></i> သိမ်းဆည်းမည်
            </button>
            <div class="admin-status-msg" id="adminStatusMsg"></div>
        </div>
    </div>

    <script>
        // ============================================================
        // OPERATORS DATA (with prices)
        // ============================================================
        let operatorsData = [{
            id: 'atom',
            name: 'ATOM',
            logo: 'https://i.imgur.com/I5iRYm8.png',
            status: 'active',
            plans: [
                { name: 'ဒေတာ 5GB', price: 5000, details: ['📶 5GB အမြန်ဒေတာ', '⏳ 7 ရက်'] },
                { name: 'ဒေတာ 15GB', price: 12000, details: ['📶 15GB အမြန်ဒေတာ', '⏳ 30 ရက်'] },
                { name: 'ဒေတာ 30GB', price: 20000, details: ['📶 30GB အမြန်ဒေတာ', '⏳ 30 ရက်'] },
                { name: 'ဒေတာ 50GB', price: 30000, details: ['📶 50GB အမြန်ဒေတာ', '⏳ 30 ရက်'] }
            ]
        }, {
            id: 'mytel',
            name: 'MYTEL',
            logo: 'https://i.imgur.com/Xl3B5xF.jpeg',
            status: 'active',
            plans: [
                { name: 'ဒေတာ 6GB', price: 6000, details: ['📶 6GB အမြန်ဒေတာ', '⏳ 7 ရက်'] },
                { name: 'ဒေတာ 20GB', price: 15000, details: ['📶 20GB အမြန်ဒေတာ', '⏳ 30 ရက်'] },
                { name: 'ဒေတာ 50GB', price: 28000, details: ['📶 50GB အမြန်ဒေတာ', '⏳ 30 ရက်'] },
                { name: 'ဒေတာ 100GB', price: 45000, details: ['📶 100GB အမြန်ဒေတာ', '⏳ 30 ရက်'] }
            ]
        }, {
            id: 'ooredoo',
            name: 'OOREDOO',
            logo: 'https://i.imgur.com/eNdLhsk.png',
            status: 'active',
            plans: [
                { name: 'ဒေတာ 4GB', price: 4500, details: ['📶 4GB အမြန်ဒေတာ', '⏳ 7 ရက်'] },
                { name: 'ဒေတာ 12GB', price: 10000, details: ['📶 12GB အမြန်ဒေတာ', '⏳ 30 ရက်'] },
                { name: 'ဒေတာ 25GB', price: 18000, details: ['📶 25GB အမြန်ဒေတာ', '⏳ 30 ရက်'] },
                { name: 'ဒေတာ 60GB', price: 35000, details: ['📶 60GB အမြန်ဒေတာ', '⏳ 30 ရက်'] }
            ]
        }, {
            id: 'mpt',
            name: 'MPT',
            logo: 'https://i.imgur.com/BNUZimj.png',
            status: 'active',
            plans: [
                { name: 'ဒေတာ 3GB', price: 4000, details: ['📶 3GB အမြန်ဒေတာ', '⏳ 7 ရက်'] },
                { name: 'ဒေတာ 10GB', price: 9000, details: ['📶 10GB အမြန်ဒေတာ', '⏳ 30 ရက်'] },
                { name: 'ဒေတာ 20GB', price: 15000, details: ['📶 20GB အမြန်ဒေတာ', '⏳ 30 ရက်'] },
                { name: 'ဒေတာ 40GB', price: 25000, details: ['📶 40GB အမြန်ဒေတာ', '⏳ 30 ရက်'] }
            ]
        }];

        // ============================================================
        // STATE
        // ============================================================
        let isShopOpen = true;
        let activeTab = 'atom';
        let shopStatusInterval = null;
        let isAdminOpen = false;

        // ============================================================
        // LOAD FROM LOCAL STORAGE
        // ============================================================
        function loadPricesFromStorage() {
            try {
                const saved = localStorage.getItem('operatorPrices');
                if (saved) {
                    const savedData = JSON.parse(saved);
                    // Update prices only
                    for (let i = 0; i < operatorsData.length; i++) {
                        const savedOp = savedData.find(op => op.id === operatorsData[i].id);
                        if (savedOp) {
                            for (let j = 0; j < operatorsData[i].plans.length; j++) {
                                if (savedOp.plans[j]) {
                                    operatorsData[i].plans[j].price = savedOp.plans[j].price;
                                }
                            }
                        }
                    }
                }
            } catch (e) {
                console.error('Error loading prices from localStorage:', e);
            }
        }

        // ============================================================
        // SAVE TO LOCAL STORAGE
        // ============================================================
        function savePricesToStorage() {
            try {
                const dataToSave = operatorsData.map(op => ({
                    id: op.id,
                    plans: op.plans.map(p => ({ price: p.price }))
                }));
                localStorage.setItem('operatorPrices', JSON.stringify(dataToSave));
            } catch (e) {
                console.error('Error saving prices to localStorage:', e);
            }
        }

        // ============================================================
        // RENDER TABS (User View)
        // ============================================================
        function renderTabs() {
            const app = document.getElementById('app');

            let tabsHtml = `
                <div class="tabs-container">
                    <div class="tab-headers">
            `;

            for (const op of operatorsData) {
                const isActive = op.id === activeTab;
                tabsHtml += `
                    <button class="tab-btn ${isActive ? 'active' : ''}" onclick="switchTab('${op.id}')">
                        <img src="${op.logo}" alt="${op.name}" onerror="this.style.display='none'">
                        <span class="tab-label">${op.name}</span>
                    </button>
                `;
            }

            tabsHtml += `
                    </div>
                    <div class="tab-contents">
            `;

            for (const op of operatorsData) {
                const isActive = op.id === activeTab;
                tabsHtml += `
                    <div class="tab-content ${isActive ? 'active' : ''}" id="tab-${op.id}">
                        <span class="operator-badge"><i class="fas fa-check-circle"></i> ${op.status === 'active' ? 'အဆင်သင့်' : 'ပြုပြင်နေဆဲ'}</span>
                        <div class="operator-plans">
                `;

                for (const plan of op.plans) {
                    const priceFormatted = plan.price.toLocaleString();
                    let detailsHtml = '';
                    for (const detail of plan.details) {
                        detailsHtml += `<div>${detail}</div>`;
                    }

                    tabsHtml += `
                        <div class="plan-card">
                            <div class="plan-name">${plan.name}</div>
                            <div class="plan-details">${detailsHtml}</div>
                            <div class="plan-price">${priceFormatted} <small>MMK</small></div>
                            <button class="plan-buy-btn" onclick="handleBuy('${op.name}', '${plan.name}', ${plan.price})" ${!isShopOpen ? 'disabled' : ''}>
                                <i class="fas fa-shopping-cart"></i> ဝယ်ယူမည်
                            </button>
                        </div>
                    `;
                }

                tabsHtml += `
                        </div>
                    </div>
                `;
            }

            tabsHtml += `
                    </div>
                </div>
            `;

            app.innerHTML = tabsHtml;
            updateButtonsStatus();
        }

        // ============================================================
        // RENDER ADMIN PANEL
        // ============================================================
        function renderAdminPanel() {
            const form = document.getElementById('adminForm');
            let html = '';

            for (const op of operatorsData) {
                html += `
                    <div class="admin-operator-group">
                        <div class="admin-operator-title">
                            <img src="${op.logo}" alt="${op.name}" onerror="this.style.display='none'">
                            ${op.name}
                        </div>
                `;

                for (let i = 0; i < op.plans.length; i++) {
                    const plan = op.plans[i];
                    html += `
                        <div class="admin-plan-row">
                            <span class="plan-label">${plan.name}</span>
                            <span class="currency-label">MMK</span>
                            <input type="number" class="price-input" id="price-${op.id}-${i}" value="${plan.price}" min="0" step="100" placeholder="ဈေးနှုန်း">
                        </div>
                    `;
                }

                html += `</div>`;
            }

            form.innerHTML = html;
        }

        // ============================================================
        // TOGGLE ADMIN PANEL
        // ============================================================
        function toggleAdminPanel() {
            isAdminOpen = !isAdminOpen;
            const panel = document.getElementById('adminPanel');
            const toggleBtn = document.getElementById('adminToggle');

            if (isAdminOpen) {
                panel.classList.add('open');
                toggleBtn.classList.add('active');
                toggleBtn.innerHTML = '<i class="fas fa-times"></i>';
                renderAdminPanel();
                // Clear any previous status message
                document.getElementById('adminStatusMsg').className = 'admin-status-msg';
                document.getElementById('adminStatusMsg').textContent = '';
            } else {
                panel.classList.remove('open');
                toggleBtn.classList.remove('active');
                toggleBtn.innerHTML = '<i class="fas fa-cog"></i>';
            }
        }

        // ============================================================
        // SAVE PRICES FROM ADMIN PANEL
        // ============================================================
        function savePrices() {
            const statusMsg = document.getElementById('adminStatusMsg');
            const saveBtn = document.getElementById('adminSaveBtn');
            saveBtn.disabled = true;
            statusMsg.className = 'admin-status-msg';
            statusMsg.textContent = '';

            try {
                // Read values from inputs
                for (const op of operatorsData) {
                    for (let i = 0; i < op.plans.length; i++) {
                        const input = document.getElementById(`price-${op.id}-${i}`);
                        if (input) {
                            const newPrice = parseInt(input.value);
                            if (!isNaN(newPrice) && newPrice >= 0) {
                                op.plans[i].price = newPrice;
                            } else {
                                throw new Error(`"${op.plans[i].name}" အတွက် မှန်ကန်သော ဈေးနှုန်းထည့်ပါ။`);
                            }
                        }
                    }
                }

                // Save to localStorage
                savePricesToStorage();

                // Re-render user view
                renderTabs();

                statusMsg.className = 'admin-status-msg success';
                statusMsg.textContent = '✅ ဈေးနှုန်းများ အောင်မြင်စွာ သိမ်းဆည်းပြီးပါပြီ။';
                saveBtn.disabled = false;

                // Auto close after 2 seconds
                setTimeout(() => {
                    if (isAdminOpen) {
                        toggleAdminPanel();
                    }
                }, 1500);

            } catch (e) {
                statusMsg.className = 'admin-status-msg error';
                statusMsg.textContent = `❌ ${e.message}`;
                saveBtn.disabled = false;
            }
        }

        // ============================================================
        // SWITCH TAB
        // ============================================================
        function switchTab(tabId) {
            activeTab = tabId;

            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
                btn.classList.remove('active');
                const img = btn.querySelector('img');
                if (img) {
                    const op = operatorsData.find(o => o.logo === img.src);
                    if (op && op.id === tabId) {
                        btn.classList.add('active');
                    }
                }
            });

            const tabContents = document.querySelectorAll('.tab-content');
            tabContents.forEach(content => {
                content.classList.remove('active');
                if (content.id === `tab-${tabId}`) {
                    content.classList.add('active');
                }
            });
        }

        // ============================================================
        // UPDATE BUTTONS
        // ============================================================
        function updateButtonsStatus() {
            const buyButtons = document.querySelectorAll('.plan-buy-btn');
            buyButtons.forEach(btn => {
                if (isShopOpen) {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    btn.style.cursor = 'pointer';
                    btn.style.pointerEvents = 'auto';
                } else {
                    btn.disabled = true;
                    btn.style.opacity = '0.4';
                    btn.style.cursor = 'not-allowed';
                    btn.style.pointerEvents = 'none';
                }
            });
        }

        // ============================================================
        // HANDLE BUY
        // ============================================================
        function handleBuy(operatorName, planName, planPrice) {
            if (!isShopOpen) {
                showNotification("ဆိုင်ပိတ်ချိန်ဖြစ်ပါသည်။ ကျေးဇူးပြု၍ နံနက် ၉ နာရီမှ ညနေ ၇ နာရီအတွင်းမှသာ ဝယ်ယူနိုင်ပါသည်။", true);
                return;
            }

            const fullPlanName = `${operatorName} - ${planName}`;
            if (window.parent && window.parent.openPaymentModalFromPlan) {
                window.parent.openPaymentModalFromPlan(fullPlanName, planPrice);
            } else {
                alert(`🛒 ${fullPlanName} - ${planPrice.toLocaleString()} MMK ဝယ်ယူရန်`);
            }
        }

        function showNotification(message, isError = false) {
            if (window.parent && window.parent.showToast) {
                window.parent.showToast(message, isError);
            } else {
                alert(message);
            }
        }

        // ============================================================
        // CHECK SHOP STATUS
        // ============================================================
        async function checkShopStatus() {
            try {
                const response = await fetch('/api/sales/status');
                const data = await response.json();
                isShopOpen = data.isOpen;
                updateButtonsStatus();
            } catch (e) {
                console.error('Error checking shop status:', e);
            }
        }

        function startShopStatusPolling() {
            if (shopStatusInterval) {
                clearInterval(shopStatusInterval);
                shopStatusInterval = null;
            }
            checkShopStatus();
            shopStatusInterval = setInterval(checkShopStatus, 5000);
            console.log('🔄 Shop status polling started (every 5 seconds)');
        }

        // ============================================================
        // LISTEN FOR PARENT MESSAGES
        // ============================================================
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'shopStatus') {
                isShopOpen = event.data.isOpen;
                updateButtonsStatus();
            }
        });

        // ============================================================
        // INIT
        // ============================================================
        function init() {
            const app = document.getElementById('app');
            app.innerHTML = '<div class="loading-text"><i class="fas fa-spinner fa-pulse"></i> Loading operators...</div>';

            // Load saved prices
            loadPricesFromStorage();

            setTimeout(() => {
                renderTabs();
                startShopStatusPolling();
            }, 500);
        }

        // ============================================================
        // EXPOSE GLOBALS
        // ============================================================
        window.switchTab = switchTab;
        window.handleBuy = handleBuy;
        window.updateButtonsStatus = updateButtonsStatus;
        window.renderTabs = renderTabs;
        window.checkShopStatus = checkShopStatus;
        window.startShopStatusPolling = startShopStatusPolling;
        window.toggleAdminPanel = toggleAdminPanel;
        window.savePrices = savePrices;

        // ============================================================
        // START
        // ============================================================
        init();
    </script>
</body>
</html>
