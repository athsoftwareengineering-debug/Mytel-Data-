<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plans Widget - ATH DIGITAL HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans Myanmar', sans-serif;
            padding: 0;
            margin: 0;
        }
        #plansContainer {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .plan-card {
            background: linear-gradient(145deg, #0f111a, #0a0c15);
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid rgba(0, 212, 255, 0.15);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .plan-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }
        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .plan-title {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .plan-icon {
            font-size: 1.8rem;
        }
        .plan-name {
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #00d4ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .badge {
            padding: 3px 10px;
            border-radius: 40px;
            font-size: 0.6rem;
            font-weight: 600;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .badge-best-seller {
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            animation: pulse 2s infinite;
        }
        .badge-popular {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        .badge-hot {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.03);
            }
            100% {
                transform: scale(1);
            }
        }
        .plan-price-box {
            text-align: right;
        }
        .plan-price {
            font-size: 1.3rem;
            font-weight: 800;
            color: #10b981;
            display: flex;
            align-items: baseline;
            gap: 3px;
        }
        .plan-price small {
            font-size: 0.65rem;
            color: #94a3b8;
            font-weight: normal;
        }
        .price-note {
            font-size: 0.55rem;
            color: #94a3b8;
            margin-top: 2px;
        }
        .feature-list {
            list-style: none;
            margin: 16px 0;
            padding: 0;
        }
        .feature-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            font-size: 0.75rem;
            color: #e2e8f0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
        }
        .feature-list li:last-child {
            border-bottom: none;
        }
        .feature-list li i {
            width: 22px;
            font-size: 0.85rem;
        }
        .feature-data i {
            color: #00d4ff !important;
        }
        .feature-data span {
            color: #00d4ff;
            font-weight: 600;
        }
        .feature-voice i {
            color: #f59e0b !important;
        }
        .feature-voice span {
            color: #f59e0b;
            font-weight: 600;
        }
        .feature-sms i {
            color: #10b981 !important;
        }
        .feature-sms span {
            color: #10b981;
            font-weight: 600;
        }
        .product-buy-btn {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #0891b2);
            border: none;
            padding: 12px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .product-buy-btn.disabled,
        .product-buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        .product-buy-btn:hover:not(:disabled) {
            transform: scale(0.98);
            background: linear-gradient(135deg, #00e5ff, #0a7e9e);
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }
        .ranking-bar {
            margin-top: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 60px;
            height: 6px;
            overflow: hidden;
        }
        .ranking-fill {
            height: 100%;
            border-radius: 60px;
            transition: width 0.5s ease;
        }
        .ranking-fill.rank-1 {
            background: linear-gradient(90deg, #f59e0b, #ea580c);
        }
        .ranking-fill.rank-2 {
            background: linear-gradient(90deg, #00d4ff, #0891b2);
        }
        .ranking-fill.rank-3 {
            background: linear-gradient(90deg, #10b981, #059669);
        }
        .ranking-fill.rank-4 {
            background: linear-gradient(90deg, #8b5cf6, #6d28d9);
        }
        .ranking-text {
            margin-top: 8px;
            font-size: 0.6rem;
            color: #94a3b8;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
        }
        .loading-text {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .loading-text i {
            margin-right: 8px;
        }
        @media (max-width: 480px) {
            .plan-card {
                padding: 1rem;
            }
            .plan-icon {
                font-size: 1.5rem;
            }
            .plan-name {
                font-size: 0.85rem;
            }
            .plan-price {
                font-size: 1.1rem;
            }
            .feature-list li {
                font-size: 0.7rem;
                padding: 6px 0;
            }
            .product-buy-btn {
                padding: 10px;
                font-size: 0.75rem;
            }
            .badge {
                padding: 2px 8px;
                font-size: 0.55rem;
            }
        }
    </style>
</head>
<body>
    <div id="plansContainer">
        <div class="loading-text"><i class="fas fa-spinner fa-pulse"></i> Loading plans...</div>
    </div>

    <script>
        // ============================================================
        // PLAN DATA (အားလုံး ၄ ခုလုံးကို တူညီတဲ့ feature အရေအတွက်နဲ့ ပြင်ဆင်)
        // ============================================================
        const plansData = [{
            id: 1,
            name: "VIP LEVEL - 1",
            price: 15000,
            icon: "🔥",
            features: [
                { text: "22 GB အမြန်နှုန်းမြင့်", type: "data" },
                { text: "8,000 မိနစ် (ကွန်ရက်တွင်း)", type: "voice" },
                { text: "5,000 SMS", type: "sms" }
            ]
        }, {
            id: 2,
            name: "VIP LEVEL - 2",
            price: 20000,
            icon: "⭐",
            features: [
                { text: "40 GB အာထရာဒေတာ", type: "data" },
                { text: "250 မိနစ် (ကွန်ရက်တွင်း)", type: "voice" },
                { text: "25 မိနစ် (အခြားကွန်ရက်)", type: "voice" }
            ]
        }, {
            id: 3,
            name: "VIP LEVEL - 3",
            price: 25000,
            icon: "💎",
            features: [
                { text: "40 GB အမြန်နှုန်း + အပို", type: "data" },
                { text: "1,400 မိနစ် (ကွန်ရက်တွင်း)", type: "voice" },
                { text: "8,000 SMS", type: "sms" }
            ]
        }, {
            id: 4,
            name: "VIP LEVEL - 4 (ULTRA)",
            price: 30000,
            icon: "👑",
            features: [
                { text: "120 GB ဂိမ်းဒေတာ", type: "data" },
                { text: "အကန့်အသတ်မရှိ Streaming", type: "streaming" },
                { text: "ဦးစားပေး ပံ့ပိုးမှု", type: "support" }
            ]
        }];

        // ============================================================
        // STATE
        // ============================================================
        let planSales = { 1: 0, 2: 0, 3: 0, 4: 0 };
        let isShopOpen = true;
        let isLoading = false;
        let shopStatusInterval = null;

        // ============================================================
        // FEATURE CONFIG
        // ============================================================
        const featureConfig = {
            data: { icon: "fa-database", class: "feature-data" },
            voice: { icon: "fa-phone-volume", class: "feature-voice" },
            sms: { icon: "fa-envelope", class: "feature-sms" },
            streaming: { icon: "fa-film", class: "feature-data" },
            support: { icon: "fa-headset", class: "feature-data" }
        };

        const planNameToId = {
            "VIP LEVEL - 1": 1,
            "VIP LEVEL - 2": 2,
            "VIP LEVEL - 3": 3,
            "VIP LEVEL - 4 (ULTRA)": 4
        };

        // ============================================================
        // LOAD SALES DATA FROM SERVER
        // ============================================================
        async function loadSalesDataFromServer() {
            if (isLoading) return;
            isLoading = true;

            try {
                const response = await fetch('/api/orders/approved-counts', {
                    credentials: 'include'
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.counts) {
                        const counts = { 1: 0, 2: 0, 3: 0, 4: 0 };
                        for (const [planName, count] of Object.entries(data.counts)) {
                            const id = planNameToId[planName];
                            if (id) counts[id] = count;
                        }
                        planSales = counts;
                        localStorage.setItem('planSales', JSON.stringify(planSales));
                    } else {
                        loadFromLocalStorage();
                    }
                } else {
                    loadFromLocalStorage();
                }
            } catch (e) {
                console.error('Error loading sales data:', e);
                loadFromLocalStorage();
            }

            isLoading = false;
            renderPlans();
        }

        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('planSales');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    planSales = { 1: parsed[1] || 0, 2: parsed[2] || 0, 3: parsed[3] || 0, 4: parsed[4] || 0 };
                }
            } catch (e) {
                console.error('Error loading from localStorage:', e);
            }
        }

        // ============================================================
        // RENDER
        // ============================================================
        function renderPlans() {
            const container = document.getElementById('plansContainer');

            const hasData = Object.values(planSales).some(v => v > 0);
            const maxSales = Math.max(...Object.values(planSales), 1);

            // အကုန်လုံးကို သတ်မှတ်ထားတဲ့ အစဉ်အတိုင်း ပြမယ် (ဘယ် plan မှ မပျောက်စေရ)
            // ဒါပေမယ့် rank အတွက်တော့ sales ကို သုံးမယ်
            const plansWithRank = plansData.map(plan => {
                const sales = planSales[plan.id] || 0;
                const rank = getRanking(sales, planSales);
                return { ...plan, sales, rank };
            });

            // rank အတွက် sorting (ဒါပေမယ့် display အစဉ်ကိုတော့ မပြောင်းစေရ)
            // → ranking bar နဲ့ badge အတွက်သာ သုံးမယ်
            // ဒါပေမယ့် rank ကို သတ်မှတ်ဖို့ sorting လိုတယ်
            // ဒါကြောင့် planSales ကို အခြေခံပြီး rank တွက်မယ်
            // ဒါပေမယ့် display order ကို id အတိုင်း ထားမယ်

            // rank ကို sorted array နဲ့ တွက်မယ်
            const sortedSales = Object.values(planSales).sort((a, b) => b - a);

            function getRank(sales) {
                const index = sortedSales.indexOf(sales);
                return index !== -1 ? index + 1 : 4;
            }

            const plansWithCorrectRank = plansData.map(plan => {
                const sales = planSales[plan.id] || 0;
                const rank = getRank(sales);
                return { ...plan, sales, rank };
            });

            // ဘယ် plan ကိုမှ မပျောက်စေရ → id အတိုင်း display
            let html = '';
            for (const p of plansWithCorrectRank) {
                const priceFormatted = p.price.toLocaleString();
                const shortName = getShortName(p.name);
                const rank = p.rank;
                const sales = p.sales;
                const badgeHtml = getBadgeHtml(p.id, sales, rank, hasData);
                const dynamicWidth = getDynamicWidth(sales, maxSales);
                const rankingText = getRankingText(rank, sales, maxSales, hasData);
                const fillClass = getRankFillClass(rank);

                let featuresHtml = '';
                for (const f of p.features) {
                    const config = featureConfig[f.type] || featureConfig.data;
                    const highlightedText = highlightNumbers(f.text);
                    featuresHtml += `<li class="${config.class}"><i class="fas ${config.icon}"></i> ${highlightedText}</li>`;
                }

                html += `
                    <div class="plan-card">
                        <div class="plan-header">
                            <div class="plan-title">
                                <span class="plan-icon">${p.icon}</span>
                                <span class="plan-name">${shortName}</span>
                                ${badgeHtml}
                            </div>
                            <div class="plan-price-box">
                                <div class="plan-price">${priceFormatted} <small>MMK</small></div>
                                <div class="price-note">/ 30 days</div>
                            </div>
                        </div>
                        <ul class="feature-list">${featuresHtml}</ul>
                        <div class="ranking-bar"><div class="ranking-fill ${fillClass}" style="width: ${dynamicWidth}%;"></div></div>
                        <div class="ranking-text"><span><i class="fas fa-chart-simple"></i> ${rankingText}</span></div>
                        <button class="product-buy-btn" onclick="handleBuy('${p.name}', ${p.price})" ${!isShopOpen ? 'disabled' : ''}>
                            <i class="fas fa-shopping-cart"></i> ဝယ်ယူမည် <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                `;
            }

            container.innerHTML = html;
            updateButtonsStatus();
        }

        // ============================================================
        // HELPER FUNCTIONS
        // ============================================================
        function highlightNumbers(text) {
            text = text.replace(/(\d+\.?\d*\s*GB)/gi, '<span>$1</span>');
            text = text.replace(/(\d+[\d,]*\s*မိနစ်)/g, '<span>$1</span>');
            text = text.replace(/(\d+[\d,]*\s*SMS)/g, '<span>$1</span>');
            return text;
        }

        function getShortName(name) {
            if (name.includes("VIP LEVEL - 1")) return "VIP 1";
            if (name.includes("VIP LEVEL - 2")) return "VIP 2";
            if (name.includes("VIP LEVEL - 3")) return "VIP 3";
            if (name.includes("ULTRA")) return "VIP 4 ULTRA";
            return name;
        }

        function getBestSellerId() {
            let bestId = 1,
                maxSales = 0;
            for (const [id, sales] of Object.entries(planSales)) {
                if (sales > maxSales) { maxSales = sales;
                    bestId = parseInt(id); }
            }
            return { bestId, maxSales };
        }

        function getRanking(sales, allSales) {
            const sorted = Object.values(allSales).sort((a, b) => b - a);
            return sorted.indexOf(sales) + 1;
        }

        function getBadgeHtml(planId, sales, rank, hasData) {
            if (!hasData || sales === 0) return '';
            const { bestId } = getBestSellerId();
            if (planId === bestId) return '<span class="badge badge-best-seller"><i class="fas fa-crown"></i> Best Seller</span>';
            if (rank === 2) return '<span class="badge badge-popular"><i class="fas fa-chart-line"></i> Popular</span>';
            if (rank === 3) return '<span class="badge badge-hot"><i class="fas fa-fire"></i> Hot</span>';
            return '';
        }

        function getDynamicWidth(sales, maxSales) {
            if (maxSales === 0 || sales === 0) return 0;
            const percentage = (sales / maxSales) * 100;
            return Math.max(8, Math.min(100, percentage));
        }

        function getRankingText(rank, sales, maxSales, hasData) {
            if (!hasData || sales === 0) {
                return '📊 စာရင်းမရှိသေးပါ';
            }
            const percentage = ((sales / maxSales) * 100).toFixed(0);
            switch (rank) {
                case 1:
                    return `🏆 အရောင်းရဆုံး (${percentage}%)`;
                case 2:
                    return `⭐ ဒုတိယအရောင်းရဆုံး (${percentage}%)`;
                case 3:
                    return `🔥 တတိယအရောင်းရဆုံး (${percentage}%)`;
                default:
                    return `📦 ဝယ်ယူမှုရှိ (${percentage}%)`;
            }
        }

        function getRankFillClass(rank) { return `rank-${rank}`; }

        // ============================================================
        // UPDATE BUTTONS
        // ============================================================
        function updateButtonsStatus() {
            const buyButtons = document.querySelectorAll('.product-buy-btn');
            buyButtons.forEach(btn => {
                if (isShopOpen) {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    btn.style.cursor = 'pointer';
                    btn.style.pointerEvents = 'auto';
                } else {
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                    btn.style.cursor = 'not-allowed';
                    btn.style.pointerEvents = 'none';
                }
            });
        }

        // ============================================================
        // HANDLE BUY
        // ============================================================
        function handleBuy(planName, planPrice) {
            if (!isShopOpen) {
                showNotification("ဆိုင်ပိတ်ချိန်ဖြစ်ပါသည်။ ကျေးဇူးပြု၍ နံနက် ၉ နာရီမှ ညနေ ၇ နာရီအတွင်းမှသာ ဝယ်ယူနိုင်ပါသည်။", true);
                return;
            }

            if (window.parent && window.parent.openPaymentModalFromPlan) {
                window.parent.openPaymentModalFromPlan(planName, planPrice);
            } else {
                alert(`🛒 ${planName} - ${planPrice.toLocaleString()} MMK ဝယ်ယူရန်`);
            }
        }

        function showNotification(message, isError = false) {
            if (window.parent && window.parent.showToast) {
                window.parent.showToast(message, isError);
            } else {
                alert(message);
            }
        }

        // ============================================================
        // CHECK SHOP STATUS (Polling - 5 seconds)
        // ============================================================
        async function checkShopStatus() {
            try {
                const response = await fetch('/api/sales/status');
                const data = await response.json();
                isShopOpen = data.isOpen;
                updateButtonsStatus();
                const statusEl = document.getElementById('salesStatus');
                if (statusEl) {
                    statusEl.textContent = data.message;
                    statusEl.className = `sales-status ${data.isOpen ? 'open' : 'closed'}`;
                }
            } catch (e) {
                console.error('Error checking shop status:', e);
            }
        }

        function startShopStatusPolling() {
            if (shopStatusInterval) {
                clearInterval(shopStatusInterval);
                shopStatusInterval = null;
            }
            checkShopStatus();
            shopStatusInterval = setInterval(checkShopStatus, 5000);
            console.log('🔄 Shop status polling started (every 5 seconds)');
        }

        // ============================================================
        // LISTEN FOR PARENT MESSAGES
        // ============================================================
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'shopStatus') {
                isShopOpen = event.data.isOpen;
                updateButtonsStatus();
            }
        });

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            const container = document.getElementById('plansContainer');
            container.innerHTML = '<div class="loading-text"><i class="fas fa-spinner fa-pulse"></i> Loading sales data...</div>';

            await loadSalesDataFromServer();
            startShopStatusPolling();

            // Sales data refresh every 30 seconds
            setInterval(async () => {
                await loadSalesDataFromServer();
            }, 30000);
        }

        // ============================================================
        // EXPOSE GLOBALS (for parent window communication)
        // ============================================================
        window.handleBuy = handleBuy;
        window.updateButtonsStatus = updateButtonsStatus;
        window.renderPlans = renderPlans;
        window.loadSalesDataFromServer = loadSalesDataFromServer;
        window.checkShopStatus = checkShopStatus;
        window.startShopStatusPolling = startShopStatusPolling;

        // ============================================================
        // START
        // ============================================================
        init();
    </script>
</body>
</html>
