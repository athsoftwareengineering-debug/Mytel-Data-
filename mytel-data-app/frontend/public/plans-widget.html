<!-- ===== operators.html (User View Only - No Admin Button) ===== -->
<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operators - ATH DIGITAL HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans Myanmar', sans-serif;
            padding: 0;
            margin: 0;
        }
        
        /* ===== TABS ===== */
        .tabs-container {
            background: linear-gradient(145deg, #0f111a, #0a0c15);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        .tab-headers {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 10px;
        }
        .tab-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border: none;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.04);
            color: #94a3b8;
            flex: 1;
            justify-content: center;
            min-width: 60px;
        }
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(8, 145, 178, 0.2));
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.05);
        }
        .tab-btn img {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.05);
        }
        .tab-btn .tab-label {
            display: inline-block;
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .operator-plans {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            padding: 4px 0;
        }
        .plan-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }
        .plan-card:hover {
            background: rgba(0, 212, 255, 0.05);
            border-color: rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }
        .plan-card .plan-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 6px;
        }
        .plan-card .plan-details {
            font-size: 0.7rem;
            color: #94a3b8;
            line-height: 1.8;
        }
        .plan-card .plan-details i {
            color: #00d4ff;
            width: 18px;
        }
        .plan-card .plan-price {
            font-size: 1.1rem;
            font-weight: 700;
            color: #10b981;
            margin-top: 10px;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .plan-card .plan-price small {
            font-size: 0.6rem;
            color: #94a3b8;
            font-weight: normal;
        }
        .plan-buy-btn {
            width: 100%;
            margin-top: 10px;
            background: linear-gradient(135deg, #00d4ff, #0891b2);
            border: none;
            padding: 8px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .plan-buy-btn:hover:not(:disabled) {
            transform: scale(0.97);
            background: linear-gradient(135deg, #00e5ff, #0a7e9e);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2);
        }
        .plan-buy-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .operator-badge {
            display: inline-block;
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 40px;
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
            margin-bottom: 12px;
        }
        
        .loading-text {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .loading-text i {
            margin-right: 8px;
        }
        
        @media (max-width: 480px) {
            .tab-btn {
                padding: 8px 12px;
                font-size: 0.7rem;
                flex: 1 1 auto;
                min-width: 50px;
            }
            .tab-btn img {
                width: 22px;
                height: 22px;
            }
            .tab-btn .tab-label {
                font-size: 0.65rem;
            }
            .operator-plans {
                grid-template-columns: 1fr 1fr;
            }
            .plan-card .plan-name {
                font-size: 0.75rem;
            }
            .plan-card .plan-price {
                font-size: 0.95rem;
            }
        }
        @media (max-width: 380px) {
            .operator-plans {
                grid-template-columns: 1fr;
            }
            .tab-headers {
                gap: 4px;
            }
            .tab-btn {
                padding: 6px 10px;
                font-size: 0.6rem;
                min-width: 40px;
            }
            .tab-btn img {
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-text"><i class="fas fa-spinner fa-pulse"></i> Loading operators...</div>
    </div>

    <script>
        // ============================================================
        // OPERATORS DATA - VIP PLANS
        // ============================================================
        let operatorsData = [{
            id: 'atom',
            name: 'ATOM',
            logo: 'https://i.imgur.com/I5iRYm8.png',
            status: 'active',
            plans: [
                { name: 'VIP LEVEL - 1', price: 15000, details: ['🔥 22 GB အမြန်နှုန်းမြင့်ဒေတာ', '📞 8,000 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 5,000 SMS'] },
                { name: 'VIP LEVEL - 2', price: 20000, details: ['⭐ 40 GB အာထရာဒေတာ', '📞 250 မိနစ် (ကွန်ရက်တွင်း)', '📞 25 မိနစ် (အခြားကွန်ရက်)'] },
                { name: 'VIP LEVEL - 3', price: 25000, details: ['💎 40 GB အမြန်နှုန်း + အပို', '📞 1,400 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 8,000 SMS'] },
                { name: 'VIP LEVEL - 4 (ULTRA)', price: 30000, details: ['👑 120 GB ဂိမ်းဒေတာ', '🎬 အကန့်အသတ်မရှိ Streaming', '🛡️ ဦးစားပေး ပံ့ပိုးမှု'] }
            ]
        }, {
            id: 'mytel',
            name: 'MYTEL',
            logo: 'https://i.imgur.com/Xl3B5xF.jpeg',
            status: 'active',
            plans: [
                { name: 'VIP LEVEL - 1', price: 15000, details: ['🔥 22 GB အမြန်နှုန်းမြင့်ဒေတာ', '📞 8,000 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 5,000 SMS'] },
                { name: 'VIP LEVEL - 2', price: 20000, details: ['⭐ 40 GB အာထရာဒေတာ', '📞 250 မိနစ် (ကွန်ရက်တွင်း)', '📞 25 မိနစ် (အခြားကွန်ရက်)'] },
                { name: 'VIP LEVEL - 3', price: 25000, details: ['💎 40 GB အမြန်နှုန်း + အပို', '📞 1,400 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 8,000 SMS'] },
                { name: 'VIP LEVEL - 4 (ULTRA)', price: 30000, details: ['👑 120 GB ဂိမ်းဒေတာ', '🎬 အကန့်အသတ်မရှိ Streaming', '🛡️ ဦးစားပေး ပံ့ပိုးမှု'] }
            ]
        }, {
            id: 'ooredoo',
            name: 'OOREDOO',
            logo: 'https://i.imgur.com/eNdLhsk.png',
            status: 'active',
            plans: [
                { name: 'VIP LEVEL - 1', price: 15000, details: ['🔥 22 GB အမြန်နှုန်းမြင့်ဒေတာ', '📞 8,000 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 5,000 SMS'] },
                { name: 'VIP LEVEL - 2', price: 20000, details: ['⭐ 40 GB အာထရာဒေတာ', '📞 250 မိနစ် (ကွန်ရက်တွင်း)', '📞 25 မိနစ် (အခြားကွန်ရက်)'] },
                { name: 'VIP LEVEL - 3', price: 25000, details: ['💎 40 GB အမြန်နှုန်း + အပို', '📞 1,400 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 8,000 SMS'] },
                { name: 'VIP LEVEL - 4 (ULTRA)', price: 30000, details: ['👑 120 GB ဂိမ်းဒေတာ', '🎬 အကန့်အသတ်မရှိ Streaming', '🛡️ ဦးစားပေး ပံ့ပိုးမှု'] }
            ]
        }, {
            id: 'mpt',
            name: 'MPT',
            logo: 'https://i.imgur.com/BNUZimj.png',
            status: 'active',
            plans: [
                { name: 'VIP LEVEL - 1', price: 15000, details: ['🔥 22 GB အမြန်နှုန်းမြင့်ဒေတာ', '📞 8,000 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 5,000 SMS'] },
                { name: 'VIP LEVEL - 2', price: 20000, details: ['⭐ 40 GB အာထရာဒေတာ', '📞 250 မိနစ် (ကွန်ရက်တွင်း)', '📞 25 မိနစ် (အခြားကွန်ရက်)'] },
                { name: 'VIP LEVEL - 3', price: 25000, details: ['💎 40 GB အမြန်နှုန်း + အပို', '📞 1,400 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 8,000 SMS'] },
                { name: 'VIP LEVEL - 4 (ULTRA)', price: 30000, details: ['👑 120 GB ဂိမ်းဒေတာ', '🎬 အကန့်အသတ်မရှိ Streaming', '🛡️ ဦးစားပေး ပံ့ပိုးမှု'] }
            ]
        }];

        // ============================================================
        // STATE
        // ============================================================
        let isShopOpen = true;
        let activeTab = 'atom';
        let shopStatusInterval = null;

        // ============================================================
        // LOAD FROM LOCAL STORAGE
        // ============================================================
        function loadPricesFromStorage() {
            try {
                const saved = localStorage.getItem('operatorPrices');
                if (saved) {
                    const savedData = JSON.parse(saved);
                    for (let i = 0; i < operatorsData.length; i++) {
                        const savedOp = savedData.find(op => op.id === operatorsData[i].id);
                        if (savedOp) {
                            for (let j = 0; j < operatorsData[i].plans.length; j++) {
                                if (savedOp.plans && savedOp.plans[j]) {
                                    operatorsData[i].plans[j].price = savedOp.plans[j].price;
                                }
                            }
                        }
                    }
                }
            } catch (e) {
                console.error('Error loading prices from localStorage:', e);
            }
        }

        // ============================================================
        // RENDER TABS
        // ============================================================
        function renderTabs() {
            const app = document.getElementById('app');

            let tabsHtml = `
                <div class="tabs-container">
                    <div class="tab-headers">
            `;

            for (const op of operatorsData) {
                const isActive = op.id === activeTab;
                tabsHtml += `
                    <button class="tab-btn ${isActive ? 'active' : ''}" onclick="switchTab('${op.id}')">
                        <img src="${op.logo}" alt="${op.name}" onerror="this.style.display='none'">
                        <span class="tab-label">${op.name}</span>
                    </button>
                `;
            }

            tabsHtml += `
                    </div>
                    <div class="tab-contents">
            `;

            for (const op of operatorsData) {
                const isActive = op.id === activeTab;
                tabsHtml += `
                    <div class="tab-content ${isActive ? 'active' : ''}" id="tab-${op.id}">
                        <span class="operator-badge"><i class="fas fa-check-circle"></i> ${op.status === 'active' ? 'အဆင်သင့်' : 'ပြုပြင်နေဆဲ'}</span>
                        <div class="operator-plans">
                `;

                for (const plan of op.plans) {
                    const priceFormatted = plan.price.toLocaleString();
                    let detailsHtml = '';
                    for (const detail of plan.details) {
                        detailsHtml += `<div><i class="fas fa-check-circle" style="color:#00d4ff;"></i> ${detail}</div>`;
                    }

                    let planIcon = '🔥';
                    if (plan.name.includes('VIP 1') || plan.name.includes('VIP LEVEL - 1')) planIcon = '🔥';
                    else if (plan.name.includes('VIP 2') || plan.name.includes('VIP LEVEL - 2')) planIcon = '⭐';
                    else if (plan.name.includes('VIP 3') || plan.name.includes('VIP LEVEL - 3')) planIcon = '💎';
                    else if (plan.name.includes('ULTRA') || plan.name.includes('VIP 4')) planIcon = '👑';

                    tabsHtml += `
                        <div class="plan-card">
                            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                                <span style="font-size:1.2rem;">${planIcon}</span>
                                <div class="plan-name">${plan.name}</div>
                            </div>
                            <div class="plan-details">${detailsHtml}</div>
                            <div class="plan-price">${priceFormatted} <small>MMK</small></div>
                            <button class="plan-buy-btn" onclick="handleBuy('${op.name}', '${plan.name}', ${plan.price})" ${!isShopOpen ? 'disabled' : ''}>
                                <i class="fas fa-shopping-cart"></i> ဝယ်ယူမည်
                            </button>
                        </div>
                    `;
                }

                tabsHtml += `
                        </div>
                    </div>
                `;
            }

            tabsHtml += `
                    </div>
                </div>
            `;

            app.innerHTML = tabsHtml;
            updateButtonsStatus();
        }

        // ============================================================
        // SWITCH TAB
        // ============================================================
        function switchTab(tabId) {
            activeTab = tabId;

            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
                btn.classList.remove('active');
                const img = btn.querySelector('img');
                if (img) {
                    const op = operatorsData.find(o => o.logo === img.src);
                    if (op && op.id === tabId) {
                        btn.classList.add('active');
                    }
                }
            });

            const tabContents = document.querySelectorAll('.tab-content');
            tabContents.forEach(content => {
                content.classList.remove('active');
                if (content.id === `tab-${tabId}`) {
                    content.classList.add('active');
                }
            });
        }

        // ============================================================
        // UPDATE BUTTONS
        // ============================================================
        function updateButtonsStatus() {
            const buyButtons = document.querySelectorAll('.plan-buy-btn');
            buyButtons.forEach(btn => {
                if (isShopOpen) {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    btn.style.cursor = 'pointer';
                    btn.style.pointerEvents = 'auto';
                } else {
                    btn.disabled = true;
                    btn.style.opacity = '0.4';
                    btn.style.cursor = 'not-allowed';
                    btn.style.pointerEvents = 'none';
                }
            });
        }

        // ============================================================
        // HANDLE BUY
        // ============================================================
        function handleBuy(operatorName, planName, planPrice) {
            if (!isShopOpen) {
                alert("ဆိုင်ပိတ်ချိန်ဖြစ်ပါသည်။ ကျေးဇူးပြု၍ နံနက် ၉ နာရီမှ ညနေ ၇ နာရီအတွင်းမှသာ ဝယ်ယူနိုင်ပါသည်။");
                return;
            }

            const fullPlanName = `${operatorName} - ${planName}`;
            if (window.parent && window.parent.openPaymentModalFromPlan) {
                window.parent.openPaymentModalFromPlan(fullPlanName, planPrice);
            } else {
                alert(`🛒 ${fullPlanName} - ${planPrice.toLocaleString()} MMK ဝယ်ယူရန်`);
            }
        }

        // ============================================================
        // CHECK SHOP STATUS
        // ============================================================
        async function checkShopStatus() {
            try {
                const response = await fetch('/api/sales/status');
                const data = await response.json();
                isShopOpen = data.isOpen;
                updateButtonsStatus();
            } catch (e) {
                console.error('Error checking shop status:', e);
            }
        }

        function startShopStatusPolling() {
            if (shopStatusInterval) {
                clearInterval(shopStatusInterval);
                shopStatusInterval = null;
            }
            checkShopStatus();
            shopStatusInterval = setInterval(checkShopStatus, 5000);
            console.log('🔄 Shop status polling started (every 5 seconds)');
        }

        // ============================================================
        // LISTEN FOR PARENT MESSAGES
        // ============================================================
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'shopStatus') {
                isShopOpen = event.data.isOpen;
                updateButtonsStatus();
            }
        });

        // ============================================================
        // INIT
        // ============================================================
        function init() {
            const app = document.getElementById('app');
            app.innerHTML = '<div class="loading-text"><i class="fas fa-spinner fa-pulse"></i> Loading operators...</div>';

            loadPricesFromStorage();

            setTimeout(() => {
                renderTabs();
                startShopStatusPolling();
            }, 500);
        }

        // ============================================================
        // EXPOSE GLOBALS
        // ============================================================
        window.switchTab = switchTab;
        window.handleBuy = handleBuy;
        window.updateButtonsStatus = updateButtonsStatus;
        window.renderTabs = renderTabs;
        window.checkShopStatus = checkShopStatus;
        window.startShopStatusPolling = startShopStatusPolling;

        // ============================================================
        // START
        // ============================================================
        init();
    </script>
</body>
</html>
