<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operators - ATH DIGITAL HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans Myanmar', sans-serif;
            padding: 0;
            margin: 0;
        }
        
        /* ===== TABS ===== */
        .tabs-container {
            background: linear-gradient(145deg, #0f111a, #0a0c15);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        .tab-headers {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 10px;
        }
        .tab-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border: none;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.04);
            color: #94a3b8;
            flex: 1;
            justify-content: center;
            min-width: 60px;
        }
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(8, 145, 178, 0.2));
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.05);
        }
        .tab-btn img {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.05);
        }
        .tab-btn .tab-label {
            display: inline-block;
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .operator-plans {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            padding: 4px 0;
        }
        .plan-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }
        .plan-card:hover {
            background: rgba(0, 212, 255, 0.05);
            border-color: rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }
        .plan-card .plan-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 6px;
        }
        .plan-card .plan-details {
            font-size: 0.7rem;
            color: #94a3b8;
            line-height: 1.8;
        }
        .plan-card .plan-details i {
            color: #00d4ff;
            width: 18px;
        }
        .plan-card .plan-price {
            font-size: 1.1rem;
            font-weight: 700;
            color: #10b981;
            margin-top: 10px;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .plan-card .plan-price small {
            font-size: 0.6rem;
            color: #94a3b8;
            font-weight: normal;
        }
        .plan-buy-btn {
            width: 100%;
            margin-top: 10px;
            background: linear-gradient(135deg, #00d4ff, #0891b2);
            border: none;
            padding: 8px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .plan-buy-btn:hover:not(:disabled) {
            transform: scale(0.97);
            background: linear-gradient(135deg, #00e5ff, #0a7e9e);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2);
        }
        .plan-buy-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .operator-badge {
            display: inline-block;
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 40px;
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
            margin-bottom: 12px;
        }
        
        .loading-text {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .loading-text i {
            margin-right: 8px;
        }
        
        /* ===== UPDATE NOTIFICATION ===== */
        .update-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,212,255,0.15);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 60px;
            padding: 10px 24px;
            font-size: 0.75rem;
            color: #e2e8f0;
            z-index: 1000;
            display: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }
        .update-notification.show {
            display: block;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        @media (max-width: 480px) {
            .tab-btn {
                padding: 8px 12px;
                font-size: 0.7rem;
                flex: 1 1 auto;
                min-width: 50px;
            }
            .tab-btn img {
                width: 22px;
                height: 22px;
            }
            .tab-btn .tab-label {
                font-size: 0.65rem;
            }
            .operator-plans {
                grid-template-columns: 1fr 1fr;
            }
            .plan-card .plan-name {
                font-size: 0.75rem;
            }
            .plan-card .plan-price {
                font-size: 0.95rem;
            }
            .update-notification {
                padding: 8px 16px;
                font-size: 0.65rem;
                bottom: 12px;
            }
        }
        @media (max-width: 380px) {
            .operator-plans {
                grid-template-columns: 1fr;
            }
            .tab-headers {
                gap: 4px;
            }
            .tab-btn {
                padding: 6px 10px;
                font-size: 0.6rem;
                min-width: 40px;
            }
            .tab-btn img {
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== UPDATE NOTIFICATION ===== -->
    <div class="update-notification" id="updateNotification">
        <i class="fas fa-sync-alt fa-spin"></i>
        <span id="updateMessage">Prices updated! Refreshing...</span>
    </div>

    <!-- ===== USER VIEW ===== -->
    <div id="app">
        <div class="loading-text"><i class="fas fa-spinner fa-pulse"></i> Loading operators...</div>
    </div>

    <script>
        // ================================================================
        //  OPERATORS - USER SIDE WITH REAL-TIME SYNC
        // ================================================================

        const API_BASE = window.location.origin;
        let isShopOpen = true;
        let activeTab = 'atom';
        let shopStatusInterval = null;
        let syncInterval = null;

        // ================================================================
        //  OPERATORS DATA - WILL BE UPDATED FROM SERVER
        // ================================================================
        let operatorsData = [{
            id: 'atom',
            name: 'ATOM',
            logo: 'https://i.imgur.com/I5iRYm8.png',
            icon: '📱',
            status: 'active',
            plans: [
                { name: 'VIP LEVEL - 1', price: 15000, details: ['🔥 22 GB အမြန်နှုန်းမြင့်ဒေတာ', '📞 8,000 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 5,000 SMS'] },
                { name: 'VIP LEVEL - 2', price: 20000, details: ['⭐ 40 GB အာထရာဒေတာ', '📞 250 မိနစ် (ကွန်ရက်တွင်း)', '📞 25 မိနစ် (အခြားကွန်ရက်)'] },
                { name: 'VIP LEVEL - 3', price: 25000, details: ['💎 40 GB အမြန်နှုန်း + အပို', '📞 1,400 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 8,000 SMS'] },
                { name: 'VIP LEVEL - 4 (ULTRA)', price: 30000, details: ['👑 120 GB ဂိမ်းဒေတာ', '🎬 အကန့်အသတ်မရှိ Streaming', '🛡️ ဦးစားပေး ပံ့ပိုးမှု'] }
            ]
        }, {
            id: 'mytel',
            name: 'MYTEL',
            logo: 'https://i.imgur.com/Xl3B5xF.jpeg',
            icon: '📶',
            status: 'active',
            plans: [
                { name: 'VIP LEVEL - 1', price: 15000, details: ['🔥 22 GB အမြန်နှုန်းမြင့်ဒေတာ', '📞 8,000 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 5,000 SMS'] },
                { name: 'VIP LEVEL - 2', price: 20000, details: ['⭐ 40 GB အာထရာဒေတာ', '📞 250 မိနစ် (ကွန်ရက်တွင်း)', '📞 25 မိနစ် (အခြားကွန်ရက်)'] },
                { name: 'VIP LEVEL - 3', price: 25000, details: ['💎 40 GB အမြန်နှုန်း + အပို', '📞 1,400 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 8,000 SMS'] },
                { name: 'VIP LEVEL - 4 (ULTRA)', price: 30000, details: ['👑 120 GB ဂိမ်းဒေတာ', '🎬 အကန့်အသတ်မရှိ Streaming', '🛡️ ဦးစားပေး ပံ့ပိုးမှု'] }
            ]
        }, {
            id: 'ooredoo',
            name: 'OOREDOO',
            logo: 'https://i.imgur.com/eNdLhsk.png',
            icon: '🚀',
            status: 'active',
            plans: [
                { name: 'VIP LEVEL - 1', price: 15000, details: ['🔥 22 GB အမြန်နှုန်းမြင့်ဒေတာ', '📞 8,000 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 5,000 SMS'] },
                { name: 'VIP LEVEL - 2', price: 20000, details: ['⭐ 40 GB အာထရာဒေတာ', '📞 250 မိနစ် (ကွန်ရက်တွင်း)', '📞 25 မိနစ် (အခြားကွန်ရက်)'] },
                { name: 'VIP LEVEL - 3', price: 25000, details: ['💎 40 GB အမြန်နှုန်း + အပို', '📞 1,400 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 8,000 SMS'] },
                { name: 'VIP LEVEL - 4 (ULTRA)', price: 30000, details: ['👑 120 GB ဂိမ်းဒေတာ', '🎬 အကန့်အသတ်မရှိ Streaming', '🛡️ ဦးစားပေး ပံ့ပိုးမှု'] }
            ]
        }, {
            id: 'mpt',
            name: 'MPT',
            logo: 'https://i.imgur.com/BNUZimj.png',
            icon: '🌟',
            status: 'active',
            plans: [
                { name: 'VIP LEVEL - 1', price: 15000, details: ['🔥 22 GB အမြန်နှုန်းမြင့်ဒေတာ', '📞 8,000 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 5,000 SMS'] },
                { name: 'VIP LEVEL - 2', price: 20000, details: ['⭐ 40 GB အာထရာဒေတာ', '📞 250 မိနစ် (ကွန်ရက်တွင်း)', '📞 25 မိနစ် (အခြားကွန်ရက်)'] },
                { name: 'VIP LEVEL - 3', price: 25000, details: ['💎 40 GB အမြန်နှုန်း + အပို', '📞 1,400 မိနစ် (ကွန်ရက်တွင်း)', '✉️ 8,000 SMS'] },
                { name: 'VIP LEVEL - 4 (ULTRA)', price: 30000, details: ['👑 120 GB ဂိမ်းဒေတာ', '🎬 အကန့်အသတ်မရှိ Streaming', '🛡️ ဦးစားပေး ပံ့ပိုးမှု'] }
            ]
        }];

        // ================================================================
        //  LOAD FROM LOCAL STORAGE (FALLBACK)
        // ================================================================
        function loadPricesFromStorage() {
            try {
                const saved = localStorage.getItem('operatorPrices');
                if (saved) {
                    const savedData = JSON.parse(saved);
                    for (let i = 0; i < operatorsData.length; i++) {
                        const savedOp = savedData.find(op => op.id === operatorsData[i].id);
                        if (savedOp) {
                            for (let j = 0; j < operatorsData[i].plans.length; j++) {
                                if (savedOp.plans && savedOp.plans[j]) {
                                    operatorsData[i].plans[j].price = savedOp.plans[j].price;
                                }
                            }
                        }
                    }
                }
            } catch (e) {
                console.error('Error loading prices from localStorage:', e);
            }
        }

        // ================================================================
        //  LOAD FROM SERVER (REAL-TIME SYNC)
        // ================================================================
        async function loadPlansFromServer() {
            try {
                const response = await fetch('/api/operator-plans', {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.plans) {
                        let updated = false;
                        for (const serverOp of data.plans) {
                            const localOp = operatorsData.find(o => o.id === serverOp.id);
                            if (localOp) {
                                // Check if prices changed
                                let priceChanged = false;
                                for (let i = 0; i < localOp.plans.length; i++) {
                                    if (serverOp.plans[i] && localOp.plans[i].price !== serverOp.plans[i].price) {
                                        priceChanged = true;
                                    }
                                    if (serverOp.plans[i]) {
                                        localOp.plans[i].price = serverOp.plans[i].price;
                                        localOp.plans[i].name = serverOp.plans[i].name || localOp.plans[i].name;
                                        localOp.plans[i].details = serverOp.plans[i].details || localOp.plans[i].details || [];
                                    }
                                }
                                if (priceChanged) updated = true;
                            }
                        }
                        
                        // Save to localStorage as backup
                        savePricesToStorage();
                        
                        if (updated) {
                            showUpdateNotification('🔄 Prices updated by admin!');
                            renderTabs();
                        }
                        return true;
                    }
                }
                return false;
            } catch (e) {
                console.error('Error loading plans from server:', e);
                return false;
            }
        }

        // ================================================================
        //  SAVE TO LOCAL STORAGE
        // ================================================================
        function savePricesToStorage() {
            try {
                const dataToSave = operatorsData.map(op => ({
                    id: op.id,
                    plans: op.plans.map(p => ({ price: p.price }))
                }));
                localStorage.setItem('operatorPrices', JSON.stringify(dataToSave));
            } catch (e) {
                console.error('Error saving prices to localStorage:', e);
            }
        }

        // ================================================================
        //  RENDER TABS
        // ================================================================
        function renderTabs() {
            const app = document.getElementById('app');

            let tabsHtml = `
                <div class="tabs-container">
                    <div class="tab-headers">
            `;

            for (const op of operatorsData) {
                const isActive = op.id === activeTab;
                tabsHtml += `
                    <button class="tab-btn ${isActive ? 'active' : ''}" onclick="switchTab('${op.id}')">
                        <img src="${op.logo}" alt="${op.name}" onerror="this.style.display='none'">
                        <span class="tab-label">${op.name}</span>
                    </button>
                `;
            }

            tabsHtml += `
                    </div>
                    <div class="tab-contents">
            `;

            for (const op of operatorsData) {
                const isActive = op.id === activeTab;
                tabsHtml += `
                    <div class="tab-content ${isActive ? 'active' : ''}" id="tab-${op.id}">
                        <span class="operator-badge"><i class="fas fa-check-circle"></i> ${op.status === 'active' ? 'အဆင်သင့်' : 'ပြုပြင်နေဆဲ'}</span>
                        <div class="operator-plans">
                `;

                for (const plan of op.plans) {
                    const priceFormatted = plan.price.toLocaleString();
                    let detailsHtml = '';
                    for (const detail of plan.details) {
                        detailsHtml += `<div><i class="fas fa-check-circle" style="color:#00d4ff;"></i> ${detail}</div>`;
                    }

                    let planIcon = '🔥';
                    if (plan.name.includes('VIP 1') || plan.name.includes('VIP LEVEL - 1')) planIcon = '🔥';
                    else if (plan.name.includes('VIP 2') || plan.name.includes('VIP LEVEL - 2')) planIcon = '⭐';
                    else if (plan.name.includes('VIP 3') || plan.name.includes('VIP LEVEL - 3')) planIcon = '💎';
                    else if (plan.name.includes('ULTRA') || plan.name.includes('VIP 4')) planIcon = '👑';

                    tabsHtml += `
                        <div class="plan-card">
                            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                                <span style="font-size:1.2rem;">${planIcon}</span>
                                <div class="plan-name">${plan.name}</div>
                            </div>
                            <div class="plan-details">${detailsHtml}</div>
                            <div class="plan-price">${priceFormatted} <small>MMK</small></div>
                            <button class="plan-buy-btn" onclick="handleBuy('${op.name}', '${plan.name}', ${plan.price})" ${!isShopOpen ? 'disabled' : ''}>
                                <i class="fas fa-shopping-cart"></i> ဝယ်ယူမည်
                            </button>
                        </div>
                    `;
                }

                tabsHtml += `
                        </div>
                    </div>
                `;
            }

            tabsHtml += `
                    </div>
                </div>
            `;

            app.innerHTML = tabsHtml;
            updateButtonsStatus();
        }

        // ================================================================
        //  SHOW UPDATE NOTIFICATION
        // ================================================================
        let notificationTimeout = null;

        function showUpdateNotification(message) {
            const el = document.getElementById('updateNotification');
            const msgEl = document.getElementById('updateMessage');
            if (el && msgEl) {
                msgEl.textContent = message;
                el.classList.add('show');
                clearTimeout(notificationTimeout);
                notificationTimeout = setTimeout(() => {
                    el.classList.remove('show');
                }, 3000);
            }
        }

        // ================================================================
        //  SWITCH TAB
        // ================================================================
        function switchTab(tabId) {
            activeTab = tabId;

            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
                btn.classList.remove('active');
                const img = btn.querySelector('img');
                if (img) {
                    const op = operatorsData.find(o => o.logo === img.src);
                    if (op && op.id === tabId) {
                        btn.classList.add('active');
                    }
                }
            });

            const tabContents = document.querySelectorAll('.tab-content');
            tabContents.forEach(content => {
                content.classList.remove('active');
                if (content.id === `tab-${tabId}`) {
                    content.classList.add('active');
                }
            });
        }

        // ================================================================
        //  UPDATE BUTTONS
        // ================================================================
        function updateButtonsStatus() {
            const buyButtons = document.querySelectorAll('.plan-buy-btn');
            buyButtons.forEach(btn => {
                if (isShopOpen) {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    btn.style.cursor = 'pointer';
                    btn.style.pointerEvents = 'auto';
                } else {
                    btn.disabled = true;
                    btn.style.opacity = '0.4';
                    btn.style.cursor = 'not-allowed';
                    btn.style.pointerEvents = 'none';
                }
            });
        }

        // ================================================================
        //  HANDLE BUY
        // ================================================================
        function handleBuy(operatorName, planName, planPrice) {
            if (!isShopOpen) {
                showNotification("ဆိုင်ပိတ်ချိန်ဖြစ်ပါသည်။ ကျေးဇူးပြု၍ နံနက် ၉ နာရီမှ ညနေ ၇ နာရီအတွင်းမှသာ ဝယ်ယူနိုင်ပါသည်။", true);
                return;
            }

            const fullPlanName = `${operatorName} - ${planName}`;
            if (window.parent && window.parent.openPaymentModalFromPlan) {
                window.parent.openPaymentModalFromPlan(fullPlanName, planPrice);
            } else {
                alert(`🛒 ${fullPlanName} - ${planPrice.toLocaleString()} MMK ဝယ်ယူရန်`);
            }
        }

        function showNotification(message, isError = false) {
            if (window.parent && window.parent.showToast) {
                window.parent.showToast(message, isError);
            } else {
                alert(message);
            }
        }

        // ================================================================
        //  CHECK SHOP STATUS
        // ================================================================
        async function checkShopStatus() {
            try {
                const response = await fetch('/api/sales/status');
                const data = await response.json();
                isShopOpen = data.isOpen;
                updateButtonsStatus();
            } catch (e) {
                console.error('Error checking shop status:', e);
            }
        }

        function startShopStatusPolling() {
            if (shopStatusInterval) {
                clearInterval(shopStatusInterval);
                shopStatusInterval = null;
            }
            checkShopStatus();
            shopStatusInterval = setInterval(checkShopStatus, 5000);
            console.log('🔄 Shop status polling started (every 5 seconds)');
        }

        // ================================================================
        //  REAL-TIME SYNC - LISTEN FOR UPDATES
        // ================================================================
        function listenForUpdates() {
            // ===== BroadcastChannel =====
            if (typeof BroadcastChannel !== 'undefined') {
                try {
                    const channel = new BroadcastChannel('operator-updates');
                    channel.onmessage = (event) => {
                        if (event.data.type === 'pricesUpdated') {
                            console.log('📦 Received update from admin (BroadcastChannel)');
                            showUpdateNotification('🔄 Prices updated by admin!');
                            loadPlansFromServer().then(() => {
                                renderTabs();
                            });
                        }
                    };
                } catch(e) {
                    console.log('BroadcastChannel not available');
                }
            }

            // ===== localStorage =====
            window.addEventListener('storage', (e) => {
                if (e.key === '_operatorUpdateTimestamp') {
                    console.log('📦 Storage update detected');
                    showUpdateNotification('🔄 Prices updated!');
                    loadPlansFromServer().then(() => {
                        renderTabs();
                    });
                }
            });

            // ===== postMessage (iframes) =====
            window.addEventListener('message', (event) => {
                if (event.data && event.data.type === 'operatorPlansUpdated') {
                    console.log('📦 Plan update from iframe');
                    const data = event.data.data;
                    if (data) {
                        for (const serverOp of data) {
                            const localOp = operatorsData.find(o => o.id === serverOp.id);
                            if (localOp) {
                                localOp.plans = serverOp.plans;
                            }
                        }
                        savePricesToStorage();
                        renderTabs();
                        showUpdateNotification('✅ Plans updated successfully!');
                    }
                }
            });

            console.log('📡 Listening for real-time updates...');
        }

        // ================================================================
        //  PERIODIC SYNC (Every 10 seconds)
        // ================================================================
        function startPeriodicSync() {
            if (syncInterval) {
                clearInterval(syncInterval);
                syncInterval = null;
            }
            syncInterval = setInterval(() => {
                loadPlansFromServer();
            }, 10000);
            console.log('🔄 Periodic sync started (every 10 seconds)');
        }

        // ================================================================
        //  INIT
        // ================================================================
        function init() {
            const app = document.getElementById('app');
            app.innerHTML = '<div class="loading-text"><i class="fas fa-spinner fa-pulse"></i> Loading operators...</div>';

            // Load saved prices from localStorage first
            loadPricesFromStorage();

            // Then try to load from server
            loadPlansFromServer().then(() => {
                renderTabs();
                startShopStatusPolling();
                startPeriodicSync();
                listenForUpdates();
            });
        }

        // ================================================================
        //  EXPOSE GLOBALS
        // ================================================================
        window.switchTab = switchTab;
        window.handleBuy = handleBuy;
        window.updateButtonsStatus = updateButtonsStatus;
        window.renderTabs = renderTabs;
        window.checkShopStatus = checkShopStatus;
        window.startShopStatusPolling = startShopStatusPolling;
        window.loadPlansFromServer = loadPlansFromServer;
        window.showUpdateNotification = showUpdateNotification;

        // ================================================================
        //  START
        // ================================================================
        init();

        console.log('📱 Operators page loaded with real-time sync');
    </script>
</body>
</html>
