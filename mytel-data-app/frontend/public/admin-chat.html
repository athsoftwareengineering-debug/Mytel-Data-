<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Chat - ATH DIGITAL HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-dark: #0a0c15;
            --bg-card: rgba(18,22,35,0.92);
            --cyan: #00d4ff;
            --emerald: #10b981;
            --rose: #f43f5e;
            --amber: #f59e0b;
            --violet: #8b5cf6;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: rgba(0,212,255,0.08);
            --card-radius: 1rem;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            background: var(--bg-dark);
            background-image: radial-gradient(ellipse at 20% 30%, rgba(139,92,246,0.05) 0%, transparent 50%);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans Myanmar', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== LAYOUT ===== */
        .chat-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== SIDEBAR - USER LIST ===== */
        .user-sidebar {
            width: 280px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
            transition: transform 0.3s ease, width 0.3s ease;
        }
        .user-sidebar.collapsed {
            width: 0;
            border-right: none;
        }
        .user-sidebar .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .user-sidebar .sidebar-header h3 {
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-sidebar .sidebar-header h3 span {
            font-size: 0.6rem;
            background: rgba(16,185,129,0.15);
            color: var(--emerald);
            padding: 2px 8px;
            border-radius: 40px;
        }
        .user-sidebar .sidebar-header .header-actions {
            display: flex;
            gap: 6px;
        }
        .user-sidebar .sidebar-header .header-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all var(--transition);
            font-size: 0.85rem;
        }
        .user-sidebar .sidebar-header .header-actions button:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }
        .user-sidebar .sidebar-header .header-actions button.danger:hover {
            background: rgba(244,63,94,0.15);
            color: var(--rose);
        }
        .user-sidebar .sidebar-search {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .user-sidebar .sidebar-search input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
            color: var(--text-primary);
            font-size: 0.75rem;
            outline: none;
            transition: all var(--transition);
        }
        .user-sidebar .sidebar-search input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 4px rgba(0,212,255,0.06);
        }
        .user-sidebar .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .user-sidebar .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            cursor: pointer;
            transition: all var(--transition);
            border-left: 3px solid transparent;
            position: relative;
        }
        .user-sidebar .user-item:hover {
            background: rgba(0,212,255,0.04);
        }
        .user-sidebar .user-item:hover .user-delete-btn {
            opacity: 1;
        }
        .user-sidebar .user-item.active {
            background: rgba(0,212,255,0.06);
            border-left-color: var(--cyan);
        }
        .user-sidebar .user-item .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cyan), var(--violet));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .user-sidebar .user-item .user-info {
            flex: 1;
            min-width: 0;
        }
        .user-sidebar .user-item .user-info .name {
            font-size: 0.8rem;
            font-weight: 600;
        }
        .user-sidebar .user-item .user-info .last-msg {
            font-size: 0.6rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-sidebar .user-item .user-time {
            font-size: 0.5rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .user-sidebar .user-item .unread-badge {
            background: var(--rose);
            color: white;
            font-size: 0.5rem;
            padding: 2px 6px;
            border-radius: 40px;
            flex-shrink: 0;
        }
        .user-sidebar .user-item .user-delete-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            opacity: 0;
            transition: all var(--transition);
            font-size: 0.7rem;
        }
        .user-sidebar .user-item .user-delete-btn:hover {
            color: var(--rose);
            background: rgba(244,63,94,0.1);
        }

        /* ===== CHAT AREA ===== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            transition: all 0.3s ease;
        }

        /* ===== CHAT HEADER ===== */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .chat-header .back-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            transition: all var(--transition);
        }
        .chat-header .back-btn:hover {
            color: var(--text-primary);
        }
        .chat-header .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cyan), #0891b2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .chat-header .info {
            flex: 1;
        }
        .chat-header .info .name {
            font-weight: 700;
            font-size: 0.9rem;
        }
        .chat-header .info .status {
            font-size: 0.55rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .chat-header .info .status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--emerald);
            display: inline-block;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .chat-header .actions {
            display: flex;
            gap: 4px;
        }
        .chat-header .actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: all var(--transition);
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-header .actions button:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }
        .chat-header .actions button.danger:hover {
            background: rgba(244,63,94,0.15);
            color: var(--rose);
        }
        .chat-header .actions button.minimize-btn:hover {
            background: rgba(245,158,11,0.15);
            color: var(--amber);
        }

        /* ===== CHAT BODY (Messages + Input) ===== */
        .chat-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .chat-body.minimized {
            max-height: 60px;
        }
        .chat-body.minimized .chat-messages {
            display: none;
        }
        .chat-body.minimized .chat-input {
            display: none;
        }

        /* ===== MESSAGES ===== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }
        .chat-messages .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 14px;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 0.85rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-messages .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--cyan), #0891b2);
            color: #030712;
            border-bottom-right-radius: 4px;
        }
        .chat-messages .message.received {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }
        .chat-messages .message .sender-name {
            font-size: 0.65rem;
            color: var(--cyan);
            display: block;
            margin-bottom: 2px;
            font-weight: 600;
        }
        .chat-messages .message .time {
            font-size: 0.5rem;
            color: var(--text-secondary);
            margin-top: 4px;
            display: block;
            text-align: right;
            opacity: 0.6;
        }
        .chat-messages .message.sent .time {
            color: rgba(3, 7, 18, 0.6);
        }
        .chat-messages .system-message {
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-secondary);
            padding: 6px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 40px;
            align-self: center;
            max-width: 90%;
        }
        .chat-messages .divider {
            text-align: center;
            font-size: 0.55rem;
            color: var(--text-secondary);
            padding: 12px 0 4px;
            border-top: 1px solid var(--border-color);
            margin-top: 4px;
        }
        .chat-messages .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .chat-messages .empty-state i {
            font-size: 2.5rem;
            color: var(--text-secondary);
            opacity: 0.2;
            margin-bottom: 12px;
        }
        .chat-messages .empty-state h3 {
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .chat-messages .empty-state p {
            font-size: 0.7rem;
        }

        /* ===== MINIMIZED BANNER ===== */
        .minimized-banner {
            display: none;
            padding: 12px 18px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            cursor: pointer;
            transition: all var(--transition);
        }
        .minimized-banner:hover {
            background: rgba(0,212,255,0.04);
        }
        .minimized-banner .banner-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cyan), var(--violet));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .minimized-banner .banner-info {
            flex: 1;
        }
        .minimized-banner .banner-info .banner-name {
            font-weight: 600;
            font-size: 0.85rem;
        }
        .minimized-banner .banner-info .banner-last-msg {
            font-size: 0.65rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .minimized-banner .banner-actions {
            display: flex;
            gap: 4px;
        }
        .minimized-banner .banner-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 50%;
            transition: all var(--transition);
            font-size: 0.8rem;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .minimized-banner .banner-actions button:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        /* ===== INPUT ===== */
        .chat-input {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .chat-input input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            font-size: 0.85rem;
            outline: none;
            transition: all var(--transition);
        }
        .chat-input input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.06);
        }
        .chat-input input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .chat-input input::placeholder {
            color: var(--text-secondary);
        }
        .chat-input .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--cyan), #0891b2);
            color: #030712;
            font-size: 1rem;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .chat-input .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.25);
        }
        .chat-input .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== DELETE CONFIRM MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: var(--bg-card);
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 420px;
            width: 90%;
            border: 1px solid var(--border-color);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
        }
        .modal-box .modal-icon {
            font-size: 2.5rem;
            color: var(--rose);
            margin-bottom: 12px;
        }
        .modal-box h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .modal-box p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .modal-box .modal-buttons {
            display: flex;
            gap: 10px;
        }
        .modal-box .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            font-size: 0.85rem;
        }
        .modal-box .modal-buttons .btn-confirm {
            background: var(--rose);
            color: white;
        }
        .modal-box .modal-buttons .btn-confirm:hover {
            background: #dc2626;
            transform: scale(0.98);
        }
        .modal-box .modal-buttons .btn-cancel {
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .modal-box .modal-buttons .btn-cancel:hover {
            background: rgba(255,255,255,0.1);
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--emerald);
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.75rem;
            z-index: 1000;
            display: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            max-width: 90%;
        }
        .toast.error {
            border-color: var(--rose);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .user-sidebar {
                width: 100%;
                position: absolute;
                top: 0;
                left: 0;
                height: 100%;
                z-index: 10;
                transition: transform 0.3s ease;
            }
            .user-sidebar.hidden {
                transform: translateX(-100%);
            }
            .chat-header .back-btn {
                display: block;
            }
            .chat-area {
                padding-left: 0;
            }
        }
        @media (max-width: 480px) {
            .chat-header {
                padding: 10px 14px;
            }
            .chat-header .info .name {
                font-size: 0.85rem;
            }
            .chat-messages {
                padding: 12px 14px;
            }
            .chat-messages .message {
                max-width: 90%;
                font-size: 0.8rem;
                padding: 8px 12px;
            }
            .chat-input {
                padding: 8px 12px;
            }
            .chat-input input {
                font-size: 0.8rem;
                padding: 8px 14px;
            }
            .chat-input .send-btn {
                width: 38px;
                height: 38px;
                font-size: 0.95rem;
            }
            .user-sidebar .user-item {
                padding: 8px 12px;
            }
            .modal-box {
                padding: 1.5rem;
            }
        }
        @media (max-width: 380px) {
            .chat-header .info .status {
                font-size: 0.5rem;
            }
            .chat-messages .message {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== DELETE CONFIRM MODAL ===== -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">
            <div class="modal-icon"><i class="fas fa-trash-alt"></i></div>
            <h3 id="deleteModalTitle">Delete Conversation</h3>
            <p id="deleteModalDesc">Are you sure you want to delete all messages with this user? This action cannot be undone.</p>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
                <button class="btn-confirm" onclick="confirmDelete()">Delete All</button>
            </div>
        </div>
    </div>

    <!-- ===== CHAT CONTAINER ===== -->
    <div class="chat-container">

        <!-- ===== USER SIDEBAR ===== -->
        <div class="user-sidebar" id="userSidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-users" style="color:var(--cyan);"></i> Customers <span id="userCount">0</span></h3>
                <div class="header-actions">
                    <button onclick="refreshChat()" title="Refresh">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button onclick="toggleSidebarCollapse()" title="Collapse Sidebar">
                        <i class="fas fa-chevron-left" id="sidebarToggleIcon"></i>
                    </button>
                    <button onclick="showDeleteAllModal()" class="danger" title="Delete All Conversations">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>
            <div class="sidebar-search">
                <input type="text" id="searchUsers" placeholder="🔍 Search users..." oninput="filterUsers()">
            </div>
            <div class="user-list" id="userList">
                <!-- Users will be rendered here -->
            </div>
        </div>

        <!-- ===== CHAT AREA ===== -->
        <div class="chat-area">
            <!-- Chat Header -->
            <div class="chat-header">
                <button class="back-btn" onclick="toggleSidebar()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="avatar" id="chatAvatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="info">
                    <div class="name" id="chatUserName">Select a customer</div>
                    <div class="status" id="chatUserStatus">
                        <span class="dot"></span>
                        <span>Select a user to start chatting</span>
                    </div>
                </div>
                <div class="actions">
                    <button onclick="toggleMinimize()" class="minimize-btn" title="Minimize Chat">
                        <i class="fas fa-minus" id="minimizeIcon"></i>
                    </button>
                    <button onclick="refreshCurrentChat()" title="Refresh">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button onclick="deleteCurrentChat()" class="danger" title="Delete this conversation" id="deleteChatBtn" style="display:none;">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                    <button onclick="closeChat()" title="Close" class="danger">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <!-- Minimized Banner -->
            <div class="minimized-banner" id="minimizedBanner" onclick="toggleMinimize()">
                <div class="banner-avatar" id="bannerAvatar">U</div>
                <div class="banner-info">
                    <div class="banner-name" id="bannerName">Select a customer</div>
                    <div class="banner-last-msg" id="bannerLastMsg">Click to expand chat</div>
                </div>
                <div class="banner-actions">
                    <button onclick="event.stopPropagation(); closeChat()" title="Close">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <!-- Chat Body -->
            <div class="chat-body" id="chatBody">
                <!-- Messages -->
                <div class="chat-messages" id="messagesContainer">
                    <div class="empty-state">
                        <i class="fas fa-comments"></i>
                        <h3>Select a customer</h3>
                        <p>Choose a user from the sidebar to start chatting</p>
                    </div>
                </div>

                <!-- Input -->
                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()" disabled>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast"></div>

    <script>
        // ================================================================
        //  ADMIN CHAT - PER USER CONVERSATION WITH MINIMIZE & COLLAPSE
        // ================================================================

        const API_BASE = window.location.origin;
        let adminId = 'admin';
        let adminName = 'Admin Support';
        let allMessages = [];
        let users = [];
        let selectedUserId = null;
        let chatInterval = null;
        let deleteTargetUserId = null;
        let isMinimized = false;
        let isSidebarCollapsed = false;

        // ================================================================
        //  TOAST
        // ================================================================
        function showToast(msg, isError) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.style.display = 'block';
            clearTimeout(toast._hideTimer);
            toast._hideTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // ================================================================
        //  SIDEBAR TOGGLE (Mobile)
        // ================================================================
        function toggleSidebar() {
            document.getElementById('userSidebar').classList.toggle('hidden');
        }

        // ================================================================
        //  SIDEBAR COLLAPSE (Desktop)
        // ================================================================
        function toggleSidebarCollapse() {
            const sidebar = document.getElementById('userSidebar');
            const icon = document.getElementById('sidebarToggleIcon');
            isSidebarCollapsed = !isSidebarCollapsed;
            
            if (isSidebarCollapsed) {
                sidebar.classList.add('collapsed');
                icon.className = 'fas fa-chevron-right';
            } else {
                sidebar.classList.remove('collapsed');
                icon.className = 'fas fa-chevron-left';
            }
        }

        // ================================================================
        //  MINIMIZE CHAT
        // ================================================================
        function toggleMinimize() {
            const chatBody = document.getElementById('chatBody');
            const banner = document.getElementById('minimizedBanner');
            const icon = document.getElementById('minimizeIcon');
            
            isMinimized = !isMinimized;
            
            if (isMinimized) {
                chatBody.classList.add('minimized');
                banner.style.display = 'flex';
                icon.className = 'fas fa-plus';
                // Update banner with current user info
                const user = users.find(u => u.id === selectedUserId);
                if (user) {
                    document.getElementById('bannerName').textContent = user.username;
                    document.getElementById('bannerAvatar').textContent = user.username.charAt(0).toUpperCase() || 'U';
                    const lastMsg = user.lastMessage || 'No messages';
                    document.getElementById('bannerLastMsg').textContent = lastMsg.substring(0, 50);
                } else {
                    document.getElementById('bannerName').textContent = 'Select a customer';
                    document.getElementById('bannerAvatar').textContent = 'U';
                    document.getElementById('bannerLastMsg').textContent = 'Click to expand chat';
                }
            } else {
                chatBody.classList.remove('minimized');
                banner.style.display = 'none';
                icon.className = 'fas fa-minus';
                // Focus input
                setTimeout(() => {
                    document.getElementById('messageInput').focus();
                }, 300);
            }
        }

        // ================================================================
        //  CLOSE CHAT
        // ================================================================
        function closeChat() {
            if (chatInterval) {
                clearInterval(chatInterval);
                chatInterval = null;
            }
            if (window.parent && window.parent.closeAdminChatWidget) {
                window.parent.closeAdminChatWidget();
            } else {
                window.close();
            }
        }

        // ================================================================
        //  REFRESH CHAT
        // ================================================================
        function refreshChat() {
            loadMessages();
            showToast('🔄 Refreshed');
        }

        function refreshCurrentChat() {
            loadMessages();
        }

        // ================================================================
        //  LOAD MESSAGES
        // ================================================================
        async function loadMessages() {
            try {
                const response = await fetch(`${API_BASE}/api/chat/messages`, {
                    credentials: 'include'
                });

                if (!response.ok) {
                    throw new Error('Failed to load messages');
                }

                const data = await response.json();
                if (data.success && data.messages) {
                    allMessages = data.messages;
                    updateUsers();
                    renderUserList();
                    if (selectedUserId) {
                        renderMessages(selectedUserId);
                        // Update banner last message
                        const user = users.find(u => u.id === selectedUserId);
                        if (user && isMinimized) {
                            document.getElementById('bannerLastMsg').textContent = (user.lastMessage || 'No messages').substring(0, 50);
                        }
                    }
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        // ================================================================
        //  UPDATE USERS LIST
        // ================================================================
        function updateUsers() {
            const userMap = new Map();
            
            for (const msg of allMessages) {
                if (msg.type === 'system') continue;
                const userId = msg.user_id;
                if (userId === adminId || userId === 'admin') continue;
                
                if (!userMap.has(userId)) {
                    userMap.set(userId, {
                        id: userId,
                        username: msg.username || userId,
                        phone: msg.phone || '',
                        lastMessage: msg.message,
                        lastTime: msg.created_at,
                        unread: 0
                    });
                } else {
                    const user = userMap.get(userId);
                    user.lastMessage = msg.message;
                    user.lastTime = msg.created_at;
                    if (msg.user_id !== adminId && msg.user_id !== 'admin') {
                        user.unread = (user.unread || 0) + 1;
                    }
                }
            }
            
            users = Array.from(userMap.values());
            users.sort((a, b) => new Date(b.lastTime) - new Date(a.lastTime));
            document.getElementById('userCount').textContent = users.length;
        }

        // ================================================================
        //  RENDER USER LIST
        // ================================================================
        function renderUserList(filter = '') {
            const container = document.getElementById('userList');
            const filteredUsers = users.filter(u => 
                u.username.toLowerCase().includes(filter.toLowerCase()) ||
                u.id.toLowerCase().includes(filter.toLowerCase())
            );

            if (!filteredUsers.length) {
                container.innerHTML = `
                    <div style="text-align:center;padding:30px;color:var(--text-secondary);font-size:0.75rem;">
                        <i class="fas fa-user-slash" style="font-size:1.2rem;display:block;margin-bottom:8px;"></i>
                        ${filter ? 'No users found' : 'No customers yet'}
                    </div>
                `;
                return;
            }

            let html = '';
            for (const user of filteredUsers) {
                const isActive = user.id === selectedUserId;
                const lastMsg = user.lastMessage || 'No messages';
                const time = user.lastTime ? new Date(user.lastTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
                const avatarLetter = user.username.charAt(0).toUpperCase() || 'U';
                
                html += `
                    <div class="user-item ${isActive ? 'active' : ''}" onclick="selectUser('${user.id}')">
                        <div class="user-avatar">${avatarLetter}</div>
                        <div class="user-info">
                            <div class="name">${escapeHtml(user.username)}</div>
                            <div class="last-msg">${escapeHtml(lastMsg.substring(0, 40))}</div>
                        </div>
                        <div class="user-time">${time}</div>
                        ${user.unread > 0 ? `<span class="unread-badge">${user.unread}</span>` : ''}
                        <button class="user-delete-btn" onclick="event.stopPropagation(); showDeleteModal('${user.id}')" title="Delete conversation">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // ================================================================
        //  FILTER USERS
        // ================================================================
        function filterUsers() {
            const input = document.getElementById('searchUsers');
            renderUserList(input.value);
        }

        // ================================================================
        //  SELECT USER
        // ================================================================
        function selectUser(userId) {
            selectedUserId = userId;
            const user = users.find(u => u.id === userId);
            
            if (user) {
                document.getElementById('chatUserName').textContent = user.username;
                document.getElementById('chatUserStatus').innerHTML = `
                    <span class="dot"></span>
                    <span>${user.phone || 'Customer'}</span>
                `;
                document.getElementById('chatAvatar').innerHTML = user.username.charAt(0).toUpperCase() || 'U';
                
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('messageInput').placeholder = `Message ${user.username}...`;
                document.getElementById('deleteChatBtn').style.display = 'block';
                
                user.unread = 0;
                
                // Update banner if minimized
                if (isMinimized) {
                    document.getElementById('bannerName').textContent = user.username;
                    document.getElementById('bannerAvatar').textContent = user.username.charAt(0).toUpperCase() || 'U';
                    document.getElementById('bannerLastMsg').textContent = (user.lastMessage || 'No messages').substring(0, 50);
                }
            }
            
            renderUserList(document.getElementById('searchUsers').value);
            renderMessages(userId);
            
            if (window.innerWidth <= 768) {
                document.getElementById('userSidebar').classList.add('hidden');
            }
            
            document.getElementById('messageInput').focus();
        }

        // ================================================================
        //  RENDER MESSAGES
        // ================================================================
        function renderMessages(userId) {
            const container = document.getElementById('messagesContainer');
            const userMessages = allMessages.filter(msg => 
                msg.user_id === userId || 
                (msg.user_id === adminId && msg.phone === userId) ||
                (msg.type === 'system' && msg.message.includes(userId))
            );

            if (!userMessages.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comment-dots"></i>
                        <h3>No messages yet</h3>
                        <p>Start the conversation with this customer</p>
                    </div>
                `;
                return;
            }

            let html = '';
            let lastDate = '';

            for (const msg of userMessages) {
                const msgDate = new Date(msg.created_at);
                const dateStr = msgDate.toLocaleDateString('my-MM', {
                    weekday: 'short',
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                if (dateStr !== lastDate) {
                    html += `<div class="divider">${dateStr}</div>`;
                    lastDate = dateStr;
                }

                const isOwn = msg.user_id === adminId || msg.user_id === 'admin';
                const timeStr = msgDate.toLocaleTimeString('my-MM', {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                if (msg.type === 'system') {
                    html += `<div class="system-message">${escapeHtml(msg.message)}</div>`;
                } else {
                    html += `
                        <div class="message ${isOwn ? 'sent' : 'received'}">
                            ${!isOwn ? `<span class="sender-name">${escapeHtml(msg.username || 'Customer')}</span>` : ''}
                            ${escapeHtml(msg.message)}
                            <span class="time">${timeStr}</span>
                        </div>
                    `;
                }
            }

            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        // ================================================================
        //  SEND MESSAGE
        // ================================================================
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();

            if (!message || !selectedUserId) return;

            const user = users.find(u => u.id === selectedUserId);
            if (!user) {
                showToast('❌ User not found', true);
                return;
            }

            sendBtn.disabled = true;
            input.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/chat/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: adminId,
                        username: adminName,
                        phone: user.phone || selectedUserId,
                        message: message
                    }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    input.value = '';
                    showToast(`✅ Message sent to ${user.username}`);
                    await loadMessages();
                    renderMessages(selectedUserId);
                } else {
                    showToast('❌ Failed to send message: ' + (data.error || 'Unknown error'), true);
                }
            } catch (error) {
                console.error('Error sending message:', error);
                showToast('❌ Failed to send message', true);
            }

            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
        }

        // ================================================================
        //  DELETE CONVERSATION
        // ================================================================
        function showDeleteModal(userId) {
            deleteTargetUserId = userId;
            const user = users.find(u => u.id === userId);
            document.getElementById('deleteModalTitle').textContent = `Delete Conversation`;
            document.getElementById('deleteModalDesc').textContent = `Are you sure you want to delete all messages with "${user ? user.username : 'this user'}"? This action cannot be undone.`;
            document.getElementById('deleteModal').classList.add('active');
        }

        function showDeleteAllModal() {
            deleteTargetUserId = 'all';
            document.getElementById('deleteModalTitle').textContent = `Delete All Conversations`;
            document.getElementById('deleteModalDesc').textContent = `Are you sure you want to delete ALL conversations with ALL users? This action cannot be undone.`;
            document.getElementById('deleteModal').classList.add('active');
        }

        function deleteCurrentChat() {
            if (selectedUserId) {
                showDeleteModal(selectedUserId);
            }
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
            deleteTargetUserId = null;
        }

        async function confirmDelete() {
            if (!deleteTargetUserId) {
                closeDeleteModal();
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/chat/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_id: deleteTargetUserId,
                        admin_id: adminId 
                    }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    const count = data.deleted || 0;
                    const msg = deleteTargetUserId === 'all' 
                        ? `🗑 Deleted all conversations (${count} messages)`
                        : `🗑 Deleted conversation (${count} messages)`;
                    showToast(msg);
                    
                    if (deleteTargetUserId === 'all') {
                        allMessages = [];
                        users = [];
                        selectedUserId = null;
                        if (isMinimized) {
                            document.getElementById('bannerName').textContent = 'Select a customer';
                            document.getElementById('bannerAvatar').textContent = 'U';
                            document.getElementById('bannerLastMsg').textContent = 'Click to expand chat';
                        }
                    } else {
                        allMessages = allMessages.filter(msg => 
                            msg.user_id !== deleteTargetUserId && 
                            !(msg.user_id === adminId && msg.phone === deleteTargetUserId)
                        );
                        if (selectedUserId === deleteTargetUserId) {
                            selectedUserId = null;
                            document.getElementById('chatUserName').textContent = 'Select a customer';
                            document.getElementById('chatUserStatus').innerHTML = `
                                <span class="dot"></span>
                                <span>Select a user to start chatting</span>
                            `;
                            document.getElementById('chatAvatar').innerHTML = '<i class="fas fa-user"></i>';
                            document.getElementById('messageInput').disabled = true;
                            document.getElementById('sendBtn').disabled = true;
                            document.getElementById('deleteChatBtn').style.display = 'none';
                            document.getElementById('messagesContainer').innerHTML = `
                                <div class="empty-state">
                                    <i class="fas fa-comments"></i>
                                    <h3>Conversation deleted</h3>
                                    <p>Select another user from the sidebar</p>
                                </div>
                            `;
                            if (isMinimized) {
                                document.getElementById('bannerName').textContent = 'Select a customer';
                                document.getElementById('bannerAvatar').textContent = 'U';
                                document.getElementById('bannerLastMsg').textContent = 'Click to expand chat';
                            }
                        }
                    }
                    
                    updateUsers();
                    renderUserList();
                    closeDeleteModal();
                } else {
                    showToast('❌ Failed to delete: ' + (data.error || 'Unknown error'), true);
                }
            } catch (error) {
                console.error('Error deleting messages:', error);
                showToast('❌ Failed to delete conversation', true);
            }
        }

        // ================================================================
        //  AUTO REFRESH
        // ================================================================
        function startAutoRefresh() {
            if (chatInterval) {
                clearInterval(chatInterval);
                chatInterval = null;
            }

            loadMessages();
            chatInterval = setInterval(() => {
                loadMessages();
            }, 3000);

            console.log('🔄 Admin chat auto-refresh started (every 3 seconds)');
        }

        // ================================================================
        //  KEYBOARD SHORTCUTS
        // ================================================================
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
            if (e.key === 'Escape') {
                if (document.getElementById('deleteModal').classList.contains('active')) {
                    closeDeleteModal();
                } else if (isMinimized) {
                    toggleMinimize();
                } else {
                    closeChat();
                }
            }
            if (e.key === 'm' && e.ctrlKey) {
                e.preventDefault();
                toggleMinimize();
            }
        });

        // ================================================================
        //  UTILITY
        // ================================================================
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ================================================================
        //  LISTEN FOR UPDATES
        // ================================================================
        function listenForUpdates() {
            if (typeof BroadcastChannel !== 'undefined') {
                try {
                    const channel = new BroadcastChannel('chat-updates');
                    channel.onmessage = (event) => {
                        if (event.data.type === 'newMessage') {
                            console.log('📦 New message received');
                            loadMessages();
                        }
                    };
                } catch (e) {}
            }

            window.addEventListener('storage', (e) => {
                if (e.key === '_chatUpdateTimestamp') {
                    console.log('📦 Storage update detected');
                    loadMessages();
                }
            });

            window.addEventListener('message', (event) => {
                if (event.data && event.data.type === 'newChatMessage') {
                    console.log('📦 Iframe update detected');
                    loadMessages();
                }
            });
        }

        // ================================================================
        //  INIT
        // ================================================================
        function init() {
            startAutoRefresh();
            listenForUpdates();
            
            setTimeout(() => {
                if (users.length > 0 && !selectedUserId) {
                    selectUser(users[0].id);
                }
            }, 500);
            
            console.log('💬 Admin Chat loaded successfully');
            console.log('👤 Admin ID:', adminId);
            console.log('🔄 Auto-refresh every 3 seconds');
            console.log('⌨️ Ctrl+Enter to send, Escape to close');
            console.log('⌨️ Ctrl+M to minimize/expand');
            console.log('🗑️ Delete conversations with trash icon');
        }

        // ================================================================
        //  EXPOSE GLOBALS
        // ================================================================
        window.closeChat = closeChat;
        window.refreshChat = refreshChat;
        window.refreshCurrentChat = refreshCurrentChat;
        window.sendMessage = sendMessage;
        window.loadMessages = loadMessages;
        window.showToast = showToast;
        window.selectUser = selectUser;
        window.filterUsers = filterUsers;
        window.toggleSidebar = toggleSidebar;
        window.toggleSidebarCollapse = toggleSidebarCollapse;
        window.toggleMinimize = toggleMinimize;
        window.showDeleteModal = showDeleteModal;
        window.showDeleteAllModal = showDeleteAllModal;
        window.deleteCurrentChat = deleteCurrentChat;
        window.confirmDelete = confirmDelete;
        window.closeDeleteModal = closeDeleteModal;

        // ================================================================
        //  START
        // ================================================================
        init();
    </script>
</body>
</html>
